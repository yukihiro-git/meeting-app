<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GIPS x RECORDER Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@400;900&display=swap');
        body { background-color: #05070a; color: #e2e8f0; font-family: 'Noto Sans JP', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .font-mono-ai { font-family: 'Orbitron', sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* 議題管理トレイ */
        #agendaTray { transform: translateY(-100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        #agendaTray.open { transform: translateY(0); }

        /* 議事録ドロワー */
        #reportDrawer { transform: translateY(calc(100% - 70px)); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        #reportDrawer.open { transform: translateY(10%); }

        .speaker-chip { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        .speaker-chip.active { background: #3b82f6; border-color: #60a5fa; box-shadow: 0 0 10px rgba(59, 130, 246, 0.4); color: white; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .danger-pulse { animation: danger-flash 1s infinite alternate; }
        @keyframes danger-flash { from { box-shadow: 0 0 5px #ef4444; } to { box-shadow: 0 0 20px #ef4444; } }
    </style>
</head>
<body class="safe-area-inset">

    <header class="p-4 pt-12 flex justify-between items-center z-40 relative glass-panel border-b-0 rounded-b-3xl">
        <div onclick="toggleAgendaTray()" class="flex-1 flex flex-col cursor-pointer">
            <span id="agendaIndex" class="text-[9px] font-mono-ai text-blue-400 tracking-tighter">AGENDA 1/1 <i class="fa-solid fa-chevron-down ml-1 text-[7px]"></i></span>
            <h2 id="currentTitle" class="text-lg font-black text-white truncate max-w-[180px]">議題を登録してください</h2>
        </div>
        <div class="text-right">
            <span class="text-[9px] font-bold text-rose-500 block">LOST COST</span>
            <span class="text-xl font-mono-ai font-bold text-rose-500">¥<span id="totalCost">0</span></span>
        </div>
    </header>

    <div id="agendaTray" class="fixed inset-x-0 top-0 pt-32 pb-8 px-6 glass-panel z-30 rounded-b-[40px] shadow-2xl">
        <h3 class="text-xs font-bold text-slate-500 mb-4 uppercase tracking-widest">議題の編集・追加</h3>
        <div id="agendaList" class="space-y-3 mb-6 max-h-[30vh] overflow-y-auto pr-2">
            </div>
        <div class="flex gap-2">
            <button onclick="addAgendaRow()" class="flex-1 py-3 border border-dashed border-slate-600 rounded-xl text-xs text-slate-400"><i class="fa-solid fa-plus mr-1"></i> 追加</button>
            <button onclick="saveAgendas()" class="flex-1 py-3 bg-blue-600 rounded-xl text-xs font-bold text-white shadow-lg">設定を完了</button>
        </div>
    </div>

    <main class="flex-1 flex flex-col items-center justify-start pt-10 px-6 z-10">
        <div class="relative flex items-center justify-center mb-8">
            <svg class="w-64 h-64">
                <circle class="text-slate-900" stroke-width="4" stroke="currentColor" fill="transparent" r="115" cx="128" cy="128"/>
                <circle id="devCircle" class="text-emerald-500 transition-all duration-700" stroke-width="8" stroke-dasharray="722" stroke-dashoffset="722" stroke-linecap="round" stroke="currentColor" fill="transparent" r="115" cx="128" cy="128"/>
            </svg>
            <div class="absolute flex flex-col items-center">
                <span id="timerDisplay" class="text-6xl font-mono-ai font-bold text-white">00:00</span>
                <span id="devPercent" class="text-[10px] font-mono-ai text-slate-500 mt-2 tracking-[0.2em]">DEVIATION 0%</span>
            </div>
        </div>

        <div class="w-full flex flex-col items-center gap-4">
            <div id="liveTranscript" class="text-xs text-center text-blue-300 italic min-h-[40px] px-8">発言を待機中...</div>
            
            <div id="speakerBar" class="w-full overflow-x-auto flex gap-2 no-scrollbar py-2">
                <button onclick="setSpeaker(null)" id="btn-default" class="speaker-chip active px-4 py-2 rounded-full text-[10px] font-bold">全員</button>
                <div id="dynamicSpeakers" class="flex gap-2"></div>
                <button onclick="openRegisterModal()" class="w-8 h-8 rounded-full border border-dashed border-slate-600 flex items-center justify-center text-slate-500"><i class="fa-solid fa-microphone-lines text-xs"></i></button>
            </div>
        </div>
    </main>

    <div id="reportDrawer" class="fixed inset-0 glass-panel z-20 rounded-t-[40px] flex flex-col">
        <div onclick="toggleReport()" class="h-[70px] flex flex-col items-center justify-center cursor-pointer">
            <div class="w-10 h-1 bg-slate-700 rounded-full mb-3"></div>
            <span class="text-[10px] font-bold text-slate-500 tracking-widest uppercase">Minutes Summary</span>
        </div>
        
        <div class="flex-1 overflow-y-auto px-6 pb-40">
            <div id="summaryLog" class="space-y-4">
                <p class="text-center text-slate-700 text-[10px] py-10 uppercase font-bold tracking-widest">Waiting for session data...</p>
            </div>
            <div class="mt-8 pt-8 border-t border-slate-800">
                <h4 class="text-[10px] font-bold text-slate-600 uppercase mb-4 tracking-widest">Full Transcript Log</h4>
                <div id="fullLog" class="space-y-2 font-mono text-[11px] text-slate-500"></div>
            </div>
        </div>

        <div class="absolute bottom-10 left-0 w-full px-8 flex gap-4">
            <button id="mainBtn" onclick="toggleMeeting()" class="flex-[4] h-16 bg-blue-600 rounded-2xl flex items-center justify-center gap-3 shadow-[0_10px_40px_rgba(37,99,235,0.4)] active:scale-95 transition-all">
                <i class="fa-solid fa-play text-white"></i>
                <span class="font-black text-white uppercase tracking-widest">Start Session</span>
            </button>
            <button onclick="nextAgenda()" id="nextBtn" class="flex-1 h-16 glass-panel rounded-2xl flex items-center justify-center text-slate-400 active:bg-slate-800 disabled:opacity-20" disabled>
                <i class="fa-solid fa-forward-step"></i>
            </button>
        </div>
    </div>

    <div id="registerModal" class="fixed inset-0 bg-black/95 z-50 hidden flex items-center justify-center p-8 backdrop-blur-md">
        <div class="w-full glass-panel p-8 rounded-[40px] border border-blue-500/30 text-center">
            <div id="regIcon" class="w-20 h-20 rounded-full bg-slate-800 mx-auto mb-6 flex items-center justify-center text-3xl text-slate-600">
                <i class="fa-solid fa-microphone"></i>
            </div>
            <h3 class="text-xl font-black text-white mb-2 uppercase tracking-tighter">話者登録</h3>
            <p class="text-xs text-slate-400 mb-8">「私は<b>〇〇</b>です」と名乗ってください。</p>
            <p id="regResult" class="text-blue-400 font-bold mb-8 h-4 italic text-sm">聞き取り待機中...</p>
            <button id="regBtn" onclick="startAutoRegister()" class="w-full py-5 bg-blue-600 text-white font-black rounded-2xl shadow-xl uppercase tracking-widest">聞き取り開始</button>
            <button onclick="closeRegisterModal()" class="w-full py-4 text-slate-500 font-bold text-xs mt-2">閉じる</button>
        </div>
    </div>

<script>
    let isRunning = false, isRegistering = false, currentIdx = 0, totalSeconds = 0, deviationScore = 0, recognition, timerInterval, timeLeft = 0, agendas = [];
    let currentSpeaker = null, speakers = [];

    window.onload = () => {
        addAgendaRow("議題1", 5);
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'ja-JP';
            recognition.onresult = (e) => {
                let final = "", interim = "";
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) final += e.results[i][0].transcript;
                    else interim += e.results[i][0].transcript;
                }
                if (isRegistering && final) processAutoRegister(final);
                if (isRunning) {
                    if (interim) document.getElementById('liveTranscript').innerText = interim;
                    if (final) processMeetingSpeech(final);
                }
            };
            recognition.onend = () => { if(isRunning || isRegistering) recognition.start(); };
        }
    };

    // --- Agenda Management ---
    function toggleAgendaTray() { document.getElementById('agendaTray').classList.toggle('open'); }
    function addAgendaRow(title="", time=5) {
        const div = document.createElement('div');
        div.className = "flex gap-2 items-center agenda-row";
        div.innerHTML = `<input type="text" placeholder="議題" value="${title}" class="flex-[3] bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs text-white outline-none"><input type="number" value="${time}" class="flex-[1] bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs text-white outline-none font-mono-ai">`;
        document.getElementById('agendaList').appendChild(div);
    }
    function saveAgendas() {
        const rows = document.querySelectorAll('.agenda-row');
        agendas = Array.from(rows).map(r => ({ title: r.querySelectorAll('input')[0].value || "未設定", time: parseInt(r.querySelectorAll('input')[1].value) || 1 }));
        currentIdx = 0; updateAgendaUI(); toggleAgendaTray();
        document.getElementById('nextBtn').disabled = agendas.length <= 1;
    }
    function updateAgendaUI() {
        const a = agendas[currentIdx];
        document.getElementById('currentTitle').innerText = a.title;
        document.getElementById('agendaIndex').innerText = `AGENDA ${currentIdx+1}/${agendas.length}`;
        timeLeft = a.time * 60; updateUI();
    }

    // --- Meeting Logic ---
    function toggleMeeting() {
        const btn = document.getElementById('mainBtn');
        if (!isRunning) {
            if(agendas.length === 0) { alert("議題を登録してください"); toggleAgendaTray(); return; }
            isRunning = true; btn.innerHTML = '<i class="fa-solid fa-stop"></i> <span class="uppercase">Finish</span>';
            btn.classList.replace('bg-blue-600', 'bg-rose-600');
            recognition.start(); timerInterval = setInterval(tick, 1000);
        } else {
            isRunning = false; btn.innerHTML = '<i class="fa-solid fa-play"></i> <span class="uppercase">Restart</span>';
            btn.classList.replace('bg-rose-600', 'bg-blue-600');
            recognition.stop(); clearInterval(timerInterval);
        }
    }

    function tick() {
        totalSeconds++;
        document.getElementById('totalCost').innerText = Math.floor((totalSeconds * 20000) / 3600).toLocaleString(); // 暫定コスト
        if (timeLeft > 0) timeLeft--; else deviationScore += 0.5;
        deviationScore = Math.min(100, deviationScore + 0.05);
        updateUI();
    }

    function processMeetingSpeech(text) {
        document.getElementById('liveTranscript').innerText = text;
        const time = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
        const logBox = document.getElementById('fullLog');
        const entry = document.createElement('div');
        entry.innerHTML = `<span class="opacity-30 mr-2">${time}</span>${currentSpeaker ? '<b class="text-blue-400">['+currentSpeaker+']</b> ' : ''}${text}`;
        logBox.prepend(entry);

        if (text.includes("決定") || text.includes("期限") || text.includes("タスク")) {
            addSummaryCard(text, time, "決定事項", "fa-check-circle text-emerald-500");
            deviationScore = Math.max(0, deviationScore - 15);
        } else if (text.includes("課題") || text.includes("問題")) {
            addSummaryCard(text, time, "課題・論点", "fa-circle-exclamation text-amber-500");
        }
    }

    function addSummaryCard(text, time, title, icon) {
        const box = document.getElementById('summaryLog');
        if (box.querySelector('p')) box.innerHTML = "";
        const card = document.createElement('div');
        card.className = "bg-slate-800/50 p-4 rounded-2xl border-l-4 border-blue-500";
        card.innerHTML = `<div class="flex justify-between items-center mb-1"><span class="text-[9px] font-bold text-slate-500 uppercase"><i class="fa-solid ${icon} mr-1"></i> ${title}</span><span class="text-[9px] text-slate-600">${time}</span></div><p class="text-xs text-slate-200">${currentSpeaker ? '<b>'+currentSpeaker+':</b> ' : ''}${text}</p>`;
        box.prepend(card);
    }

    // --- Speaker & Registration ---
    function startAutoRegister() { isRegistering = true; recognition.start(); document.getElementById('regIcon').classList.add('text-rose-500', 'animate-pulse'); }
    function processAutoRegister(text) {
        let name = text.replace(/私は|です|と申します|と言います/g, "").trim();
        if (name.length > 0 && name.length < 8) {
            if(!speakers.includes(name)) {
                speakers.push(name);
                const btn = document.createElement('button');
                btn.className = "speaker-chip px-4 py-2 rounded-full text-[10px] font-bold bg-slate-800 text-slate-400";
                btn.innerText = name; btn.onclick = () => setSpeaker(name);
                document.getElementById('dynamicSpeakers').appendChild(btn);
            }
            document.getElementById('regResult').innerText = `登録：${name}さん`;
        }
    }
    function setSpeaker(n) {
        currentSpeaker = n;
        document.querySelectorAll('.speaker-chip').forEach(b => b.classList.toggle('active', b.innerText === n || (n === null && b.id === 'btn-default')));
    }

    // --- UI Helpers ---
    function updateUI() {
        const m = Math.floor(Math.abs(timeLeft)/60).toString().padStart(2,'0'), s = (Math.abs(timeLeft)%60).toString().padStart(2,'0');
        document.getElementById('timerDisplay').innerText = `${m}:${s}`;
        const circle = document.getElementById('devCircle'), circum = 115 * 2 * Math.PI;
        circle.style.strokeDashoffset = circum - (deviationScore/100) * circum;
        document.getElementById('devPercent').innerText = `DEVIATION ${Math.floor(deviationScore)}%`;
        circle.style.color = deviationScore > 80 ? "#f43f5e" : (deviationScore > 40 ? "#fbbf24" : "#10b981");
    }
    function toggleReport() { document.getElementById('reportDrawer').classList.toggle('open'); }
    function openRegisterModal() { document.getElementById('registerModal').classList.remove('hidden'); }
    function closeRegisterModal() { isRegistering = false; document.getElementById('registerModal').classList.add('hidden'); }
    function nextAgenda() { if(currentIdx < agendas.length-1) { currentIdx++; updateAgendaUI(); deviationScore = Math.max(0, deviationScore-20); } }
</script>
</body>
</html>
