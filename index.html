<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GIPS Mobile Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Noto Sans JP', sans-serif; height: 100vh; overflow: hidden; }
        .font-mono-ai { font-family: 'Orbitron', sans-serif; }
        
        /* 話者ドック */
        .speaker-dock { display: flex; gap: 8px; overflow-x: auto; padding: 12px 16px; background: #fff; border-bottom: 1px solid #e2e8f0; }
        .speaker-chip { flex: 0 0 auto; padding: 8px 16px; border-radius: 12px; background: #f1f5f9; font-size: 12px; font-weight: 700; border: 2px solid #e2e8f0; color: #64748b; }
        .speaker-chip.active { background: #2563eb; color: #fff; border-color: #2563eb; }

        /* 議題編集モーダル（2段レイアウト） */
        #agendaModal { position: fixed; inset: 0; background: #fff; z-index: 200; display: none; flex-direction: column; }
        #agendaModal.open { display: flex; }
        .agenda-card { background: #f8fafc; border: 2px solid #f1f5f9; border-radius: 20px; padding: 16px; margin-bottom: 12px; }

        /* 議事録ドロワー */
        #reportDrawer { position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh; background: #fff; transform: translateY(calc(100% - 60px)); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); z-index: 80; border-radius: 32px 32px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.05); }
        #reportDrawer.open { transform: translateY(15%); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col">

    <div class="pt-10 bg-white shadow-sm">
        <div class="speaker-dock no-scrollbar" id="speakerDock">
            <button onclick="setSpeaker(null)" id="btn-default" class="speaker-chip active">全員</button>
        </div>
    </div>

    <main class="flex-1 flex flex-col p-6 overflow-hidden">
        <div class="flex justify-between items-center mb-6" onclick="openAgendaModal()">
            <div class="flex-1">
                <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-1">Current Agenda <i class="fa-solid fa-pen-to-square ml-1 text-[8px]"></i></p>
                <h2 id="currentTitle" class="text-xl font-black text-slate-900 leading-tight truncate pr-4">議題をタップして設定</h2>
            </div>
            <div class="bg-rose-50 px-4 py-2 rounded-2xl border border-rose-100 text-right">
                <p class="text-[8px] font-bold text-rose-500 uppercase tracking-tighter">Lost Cost</p>
                <p class="text-xl font-mono-ai font-bold text-rose-600">¥<span id="totalCost">0</span></p>
            </div>
        </div>

        <div class="relative flex items-center justify-center mb-6">
            <svg class="w-64 h-64">
                <circle class="text-slate-100" stroke-width="8" stroke="currentColor" fill="transparent" r="110" cx="128" cy="128"/>
                <circle id="devCircle" class="text-blue-600 transition-all duration-700" stroke-width="12" stroke-dasharray="691" stroke-dashoffset="691" stroke-linecap="round" stroke="currentColor" fill="transparent" r="110" cx="128" cy="128"/>
            </svg>
            <div class="absolute flex flex-col items-center">
                <span id="timerDisplay" class="text-6xl font-mono-ai font-bold text-slate-900 tracking-tighter">00:00</span>
                <span id="devPercent" class="text-[10px] font-bold text-slate-400 mt-2 uppercase tracking-widest">Deviation 0%</span>
            </div>
        </div>

        <div class="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm flex-1 flex items-center justify-center text-center">
            <p id="liveTranscript" class="text-sm text-slate-400 italic">音声を待機中...</p>
        </div>
    </main>

    <div id="agendaModal">
        <div class="p-6 pt-12 flex justify-between items-center border-b bg-white sticky top-0 z-10">
            <h3 class="text-xl font-black text-slate-900 italic">議題の構成</h3>
            <button onclick="closeAgendaModal()" class="text-slate-400 text-2xl p-2"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-6 space-y-4" id="agendaInputList">
            </div>
        <div class="p-6 bg-slate-50 border-t space-y-3 pb-12">
            <button onclick="addAgendaRow()" class="w-full py-4 bg-white border-2 border-slate-200 rounded-2xl text-slate-600 font-bold text-sm shadow-sm active:bg-slate-50">
                <i class="fa-solid fa-plus mr-1 text-blue-500"></i> 新しい議題を追加
            </button>
            <button onclick="saveAgendas()" class="w-full py-5 bg-blue-600 text-white font-black rounded-2xl text-lg shadow-xl active:scale-95 transition-all">
                設定を保存して戻る
            </button>
        </div>
    </div>

    <div id="registerModal" class="fixed inset-0 bg-slate-900/50 z-[150] hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="w-full bg-white p-10 rounded-[48px] text-center border border-white shadow-2xl">
            <div id="regIndicator" class="w-20 h-20 rounded-full bg-slate-50 mx-auto mb-6 flex items-center justify-center text-3xl text-slate-300 border-2 border-slate-100 transition-all"><i class="fa-solid fa-microphone"></i></div>
            <h3 class="text-xl font-black text-slate-900 mb-2">話者の追加</h3>
            <p class="text-sm text-slate-500 mb-10">「私は<span class="text-blue-600 font-bold">〇〇</span>です」と<br>スマホに向かって話してください。</p>
            <button id="regBtn" onclick="startAutoRegister()" class="w-full py-5 bg-blue-600 text-white font-black rounded-2xl shadow-xl mb-4">聞き取り開始</button>
            <button onclick="closeRegisterModal()" class="text-slate-400 font-bold text-sm">キャンセル</button>
        </div>
    </div>

    <div id="reportDrawer">
        <div onclick="toggleReport()" class="h-[60px] flex flex-col items-center justify-center"><div class="w-10 h-1 bg-slate-200 rounded-full"></div></div>
        <div class="flex-1 overflow-y-auto px-6 pb-40">
            <div id="summaryLog" class="space-y-4 pt-2"></div>
            <div id="fullLog" class="mt-8 pt-8 border-t border-slate-100 space-y-2 font-mono text-[10px] text-slate-400"></div>
        </div>
    </div>

    <div class="fixed bottom-10 left-0 w-full px-8 flex gap-4 z-[90]">
        <button id="mainBtn" onclick="toggleMeeting()" class="flex-[3] h-18 bg-blue-600 text-white rounded-3xl flex items-center justify-center gap-3 shadow-2xl active:scale-95 transition-all">
            <i class="fa-solid fa-play text-xl"></i><span class="text-lg font-black uppercase tracking-tight">Meeting Start</span>
        </button>
        <button onclick="openRegisterModal()" class="flex-1 h-18 bg-white text-blue-600 rounded-3xl flex items-center justify-center border-2 border-blue-50 shadow-lg active:scale-95 transition-all">
            <i class="fa-solid fa-user-plus text-2xl"></i>
        </button>
    </div>

<script>
    let isRunning = false, isRegistering = false, currentIdx = 0, totalSeconds = 0, deviationScore = 0, recognition, timerInterval, timeLeft = 0, agendas = [];
    let currentSpeaker = null, speakers = [];

    window.onload = () => {
        addAgendaRow("議題1", 10);
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'ja-JP';
            recognition.onresult = (e) => {
                let final = "", interim = "";
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) final += e.results[i][0].transcript;
                    else interim += e.results[i][0].transcript;
                }
                if (isRegistering && final) processAutoRegister(final);
                if (isRunning) {
                    if (interim) document.getElementById('liveTranscript').innerText = interim;
                    if (final) processMeetingSpeech(final);
                }
            };
            recognition.onend = () => { if(isRunning || isRegistering) recognition.start(); };
        }
    };

    function openAgendaModal() { document.getElementById('agendaModal').classList.add('open'); }
    function closeAgendaModal() { document.getElementById('agendaModal').classList.remove('open'); }

    function addAgendaRow(title="", time=10) {
        const container = document.getElementById('agendaInputList');
        const card = document.createElement('div');
        card.className = "agenda-card space-y-4 shadow-sm relative";
        card.innerHTML = `
            <div class="flex flex-col gap-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">議題のタイトル</label>
                <input type="text" placeholder="例：進捗の共有" value="${title}" class="w-full bg-white border-b-2 border-slate-200 py-2 text-slate-900 font-bold text-lg outline-none focus:border-blue-500">
            </div>
            <div class="flex items-end justify-between">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">配分時間 (分)</label>
                    <div class="flex items-center gap-4 bg-white rounded-xl p-1 border">
                        <button onclick="adjustTime(this, -1)" class="w-10 h-10 flex items-center justify-center text-blue-500 bg-blue-50 rounded-lg active:scale-90 transition"><i class="fa-solid fa-minus"></i></button>
                        <input type="number" value="${time}" class="w-12 text-center font-mono font-black text-blue-600 bg-transparent outline-none">
                        <button onclick="adjustTime(this, 1)" class="w-10 h-10 flex items-center justify-center text-blue-500 bg-blue-50 rounded-lg active:scale-90 transition"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
                <button onclick="this.closest('.agenda-card').remove()" class="text-rose-400 p-2 text-sm"><i class="fa-solid fa-trash-can mr-1"></i> 削除</button>
            </div>
        `;
        container.appendChild(card);
    }

    function adjustTime(btn, delta) {
        const input = btn.parentElement.querySelector('input');
        input.value = Math.max(1, parseInt(input.value) + delta);
    }

    function saveAgendas() {
        const cards = document.querySelectorAll('.agenda-card');
        agendas = Array.from(cards).map(card => ({
            title: card.querySelector('input[type="text"]').value || "未設定",
            time: parseInt(card.querySelector('input[type="number"]').value) || 1
        }));
        if(agendas.length > 0) {
            currentIdx = 0;
            updateAgendaUI();
            closeAgendaModal();
        }
    }

    function updateAgendaUI() {
        if(agendas[currentIdx]) {
            document.getElementById('currentTitle').innerText = agendas[currentIdx].title;
            timeLeft = agendas[currentIdx].time * 60;
            updateUI();
        }
    }

    function toggleMeeting() {
        const btn = document.getElementById('mainBtn');
        if (!isRunning) {
            if(agendas.length === 0) { openAgendaModal(); return; }
            isRunning = true;
            btn.innerHTML = '<i class="fa-solid fa-stop text-xl"></i> <span class="uppercase">Finish</span>';
            btn.classList.replace('bg-blue-600', 'bg-rose-600');
            recognition.start();
            timerInterval = setInterval(tick, 1000);
        } else {
            isRunning = false;
            btn.innerHTML = '<i class="fa-solid fa-play text-xl"></i> <span class="uppercase">Meeting Start</span>';
            btn.classList.replace('bg-rose-600', 'bg-blue-600');
            recognition.stop();
            clearInterval(timerInterval);
        }
    }

    function tick() {
        totalSeconds++;
        document.getElementById('totalCost').innerText = Math.floor((totalSeconds * 20000) / 3600).toLocaleString();
        if (timeLeft > 0) timeLeft--; else deviationScore += 0.4;
        deviationScore = Math.min(100, deviationScore + 0.05);
        updateUI();
    }

    function startAutoRegister() {
        isRegistering = true; recognition.start();
        document.getElementById('regIndicator').classList.add('bg-blue-600', 'text-white', 'border-blue-600', 'animate-pulse');
        document.getElementById('regBtn').innerText = "お名前を聞いています...";
    }

    function processAutoRegister(text) {
        let name = text.replace(/私は|です|と申します|と言います/g, "").trim();
        if (name.length > 1 && name.length < 8) {
            if(!speakers.includes(name)) {
                speakers.push(name);
                const chip = document.createElement('button');
                chip.className = "speaker-chip";
                chip.innerText = name; chip.onclick = () => setSpeaker(name);
                document.getElementById('speakerDock').appendChild(chip);
                if (navigator.vibrate) navigator.vibrate(50);
                setTimeout(closeRegisterModal, 800);
            }
        }
    }

    function processMeetingSpeech(text) {
        const logBox = document.getElementById('fullLog');
        const entry = document.createElement('div');
        const time = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
        entry.innerHTML = `<span class="opacity-30 mr-2">${time}</span>${currentSpeaker ? '<b>['+currentSpeaker+']</b> ' : ''}${text}`;
        logBox.prepend(entry);
        if (text.includes("決定") || text.includes("タスク")) addSummaryCard(text, time);
        updateUI();
    }

    function addSummaryCard(text, time) {
        const box = document.getElementById('summaryLog');
        const card = document.createElement('div');
        card.className = "bg-white p-4 rounded-2xl border-l-4 border-emerald-500 shadow-sm border border-slate-100";
        card.innerHTML = `<p class="text-[9px] font-bold text-emerald-600 uppercase mb-1">Decision / Action</p><p class="text-xs text-slate-800 font-bold leading-relaxed">${text}</p>`;
        box.prepend(card);
    }

    function setSpeaker(n) {
        currentSpeaker = n;
        document.querySelectorAll('.speaker-chip').forEach(b => b.classList.toggle('active', b.innerText === n || (n === null && b.id === 'btn-default')));
    }

    function updateUI() {
        const circle = document.getElementById('devCircle'), circum = 691;
        circle.style.strokeDashoffset = circum - (deviationScore/100) * circum;
        document.getElementById('devPercent').innerText = `Deviation ${Math.floor(deviationScore)}%`;
        circle.style.color = deviationScore > 80 ? "#e11d48" : (deviationScore > 40 ? "#f59e0b" : "#2563eb");
        const m = Math.floor(Math.abs(timeLeft)/60).toString().padStart(2,'0'), s = (Math.abs(timeLeft)%60).toString().padStart(2,'0');
        document.getElementById('timerDisplay').innerText = `${m}:${s}`;
    }

    function toggleReport() { document.getElementById('reportDrawer').classList.toggle('open'); }
    function openRegisterModal() { document.getElementById('registerModal').classList.remove('hidden'); }
    function closeRegisterModal() { isRegistering = false; document.getElementById('registerModal').classList.add('hidden'); }
</script>
</body>
</html>
