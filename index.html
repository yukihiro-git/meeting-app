<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GIPS Light Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        :root {
            --bg-main: #f1f5f9;
            --panel-bg: #ffffff;
            --text-main: #1e293b;
            --accent-blue: #2563eb;
            --accent-rose: #e11d48;
            --accent-emerald: #10b981;
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            font-family: 'Noto Sans JP', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .font-mono-ai { font-family: 'Orbitron', sans-serif; }

        /* 話者リスト（ライトモード用） */
        .speaker-dock {
            display: flex; gap: 10px; overflow-x: auto; padding: 12px 16px;
            background: var(--panel-bg); border-bottom: 1px solid #e2e8f0;
        }

        .speaker-chip {
            flex: 0 0 auto; padding: 10px 18px; border-radius: 14px;
            background: #f8fafc; font-size: 13px; font-weight: 700;
            border: 2px solid #e2e8f0; color: #64748b; transition: all 0.2s;
        }

        .speaker-chip.active {
            background: var(--accent-blue); color: #fff;
            border-color: var(--accent-blue); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        /* アジェンダトレイ */
        #agendaTray {
            position: fixed; top: 0; left: 0; width: 100%; background: var(--panel-bg);
            z-index: 100; transform: translateY(-100%); transition: transform 0.4s ease;
            padding: 80px 24px 24px; border-bottom: 4px solid var(--accent-blue);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        #agendaTray.open { transform: translateY(0); }

        /* 議事録ドロワー */
        #reportDrawer {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh;
            background: var(--panel-bg); transform: translateY(calc(100% - 70px));
            transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
            z-index: 80; border-radius: 32px 32px 0 0;
            box-shadow: 0 -15px 40px rgba(0,0,0,0.08); border: 1px solid #e2e8f0;
        }
        #reportDrawer.open { transform: translateY(10%); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="flex flex-col">

    <div id="toastContainer"></div>

    <div class="pt-10 bg-white">
        <div class="speaker-dock no-scrollbar" id="speakerDock">
            <button onclick="setSpeaker(null)" id="btn-default" class="speaker-chip active">全員</button>
            </div>
    </div>

    <main class="flex-1 flex flex-col p-6 overflow-hidden">
        <div class="flex justify-between items-center mb-6" onclick="toggleAgendaTray()">
            <div class="flex-1">
                <p class="text-[11px] font-bold text-blue-600 uppercase tracking-widest mb-1">Current Agenda <i class="fa-solid fa-chevron-down ml-1"></i></p>
                <h2 id="currentTitle" class="text-xl font-black text-slate-900 leading-tight">議題未設定</h2>
            </div>
            <div class="bg-rose-50 p-3 rounded-2xl border border-rose-100 text-right">
                <p class="text-[9px] font-bold text-rose-500 uppercase tracking-tighter">Lost Cost</p>
                <p class="text-xl font-mono-ai font-bold text-rose-600">¥<span id="totalCost">0</span></p>
            </div>
        </div>

        <div class="relative flex items-center justify-center mb-8">
            <svg class="w-64 h-64">
                <circle class="text-slate-100" stroke-width="10" stroke="currentColor" fill="transparent" r="110" cx="128" cy="128"/>
                <circle id="devCircle" class="text-blue-600 transition-all duration-700" stroke-width="12" stroke-dasharray="691" stroke-dashoffset="691" stroke-linecap="round" stroke="currentColor" fill="transparent" r="110" cx="128" cy="128"/>
            </svg>
            <div class="absolute flex flex-col items-center">
                <span id="timerDisplay" class="text-6xl font-mono-ai font-bold text-slate-900 tracking-tighter">00:00</span>
                <span id="devPercent" class="text-[10px] font-bold text-slate-400 mt-2 tracking-widest uppercase">Deviation 0%</span>
            </div>
        </div>

        <div class="bg-white rounded-3xl p-5 border border-slate-200 card-shadow min-h-[100px] flex items-center justify-center text-center">
            <p id="liveTranscript" class="text-sm text-slate-500 italic leading-relaxed">音声入力を待機しています...</p>
        </div>
    </main>

    <div id="reportDrawer">
        <div onclick="toggleReport()" class="h-[70px] flex flex-col items-center justify-center">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full"></div>
            <span class="text-xs font-bold text-slate-400 mt-2 uppercase tracking-tighter italic">Minute Log & Summary</span>
        </div>
        <div class="flex-1 overflow-y-auto px-6 pb-48">
            <div id="summaryLog" class="space-y-4 pt-4"></div>
            <div id="fullLog" class="mt-10 pt-8 border-t border-slate-100 space-y-3 font-mono text-[11px] text-slate-400"></div>
        </div>
    </div>

    <div class="fixed bottom-10 left-0 w-full px-8 flex gap-4 z-[90]">
        <button id="mainBtn" onclick="toggleMeeting()" class="flex-[3] h-18 bg-blue-600 text-white rounded-3xl flex items-center justify-center gap-4 shadow-[0_15px_30px_rgba(37,99,235,0.3)] active:scale-95 transition-all">
            <i class="fa-solid fa-play text-xl"></i>
            <span class="text-lg font-black uppercase tracking-tight">Meeting Start</span>
        </button>
        <button onclick="openRegisterModal()" class="flex-1 h-18 bg-white text-blue-600 rounded-3xl flex items-center justify-center active:scale-95 transition-all border-2 border-blue-50 shadow-lg">
            <i class="fa-solid fa-user-plus text-2xl"></i>
        </button>
    </div>

    <div id="agendaTray">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-slate-900 font-black text-xl">議題の構成</h3>
            <button onclick="addAgendaRow()" class="text-blue-600 font-bold text-sm">+ 議題を追加</button>
        </div>
        <div id="agendaInputList" class="space-y-3 mb-8"></div>
        <button onclick="saveAgendas()" class="w-full py-5 bg-blue-600 rounded-2xl text-lg font-black text-white shadow-xl">この内容で開始準備</button>
    </div>

    <div id="registerModal" class="fixed inset-0 bg-slate-900/40 z-[150] hidden flex items-center justify-center p-8 backdrop-blur-md">
        <div class="w-full bg-white p-10 rounded-[48px] shadow-2xl text-center relative border border-white">
            <div id="regIndicator" class="w-24 h-24 rounded-full bg-slate-50 mx-auto mb-6 flex items-center justify-center text-4xl text-slate-300 border-2 border-slate-100 transition-all">
                <i class="fa-solid fa-microphone"></i>
            </div>
            <h3 class="text-2xl font-black text-slate-900 mb-2 tracking-tight">話者の音声登録</h3>
            <p class="text-sm text-slate-500 mb-10 leading-relaxed">「私は<span class="text-blue-600 font-bold">〇〇</span>です」と<br>スマホに向かって名乗ってください。</p>
            <button id="regBtn" onclick="startAutoRegister()" class="w-full py-5 bg-blue-600 text-white font-black rounded-2xl shadow-xl mb-4">聞き取り開始</button>
            <button onclick="closeRegisterModal()" class="text-slate-400 font-bold text-sm">戻る</button>
        </div>
    </div>

<script>
    let isRunning = false, isRegistering = false, currentIdx = 0, totalSeconds = 0, deviationScore = 0, recognition, timerInterval, timeLeft = 0, agendas = [];
    let currentSpeaker = null, speakers = [];

    window.onload = () => {
        addAgendaRow("議題1", 10);
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'ja-JP';
            recognition.onresult = (e) => {
                let final = "", interim = "";
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) final += e.results[i][0].transcript;
                    else interim += e.results[i][0].transcript;
                }
                if (isRegistering && final) processAutoRegister(final);
                if (isRunning) {
                    if (interim) document.getElementById('liveTranscript').innerText = interim;
                    if (final) processMeetingSpeech(final);
                }
            };
            recognition.onend = () => { if(isRunning || isRegistering) recognition.start(); };
        }
    };

    function toggleAgendaTray() { document.getElementById('agendaTray').classList.toggle('open'); }
    function addAgendaRow(title="", time=10) {
        const div = document.createElement('div');
        div.className = "flex gap-2 items-center agenda-row";
        div.innerHTML = `<input type="text" placeholder="議題の内容" value="${title}" class="flex-[3] bg-slate-50 border-2 border-slate-100 rounded-xl p-4 text-slate-900 font-bold outline-none focus:border-blue-500"><input type="number" value="${time}" class="flex-[1] bg-slate-50 border-2 border-slate-100 rounded-xl p-4 text-slate-900 font-mono font-bold outline-none text-center">`;
        document.getElementById('agendaInputList').appendChild(div);
    }
    function saveAgendas() {
        const rows = document.querySelectorAll('.agenda-row');
        agendas = Array.from(rows).map(r => ({ title: r.querySelectorAll('input')[0].value || "未設定", time: parseInt(r.querySelectorAll('input')[1].value) || 1 }));
        currentIdx = 0; updateAgendaUI(); toggleAgendaTray();
    }
    function updateAgendaUI() {
        const a = agendas[currentIdx];
        document.getElementById('currentTitle').innerText = a.title;
        timeLeft = a.time * 60; updateUI();
    }

    function toggleMeeting() {
        const btn = document.getElementById('mainBtn');
        if (!isRunning) {
            isRunning = true; btn.innerHTML = '<i class="fa-solid fa-stop text-xl"></i> <span class="text-lg font-black uppercase">Finish</span>';
            btn.classList.replace('bg-blue-600', 'bg-rose-600');
            recognition.start(); timerInterval = setInterval(tick, 1000);
        } else {
            isRunning = false; btn.innerHTML = '<i class="fa-solid fa-play text-xl"></i> <span class="text-lg font-black uppercase">Meeting Start</span>';
            btn.classList.replace('bg-rose-600', 'bg-blue-600');
            recognition.stop(); clearInterval(timerInterval);
        }
    }

    function startAutoRegister() {
        isRegistering = true; recognition.start();
        document.getElementById('regIndicator').classList.add('bg-blue-600', 'text-white', 'border-blue-600', 'animate-pulse');
        document.getElementById('regBtn').innerText = "お名前を聞いています...";
    }

    function processAutoRegister(text) {
        let name = text.replace(/私は|です|と申します|と言います/g, "").trim();
        if (name.length > 1 && name.length < 8) {
            if(!speakers.includes(name)) {
                speakers.push(name);
                const chip = document.createElement('button');
                chip.className = "speaker-chip";
                chip.innerText = name;
                chip.onclick = () => setSpeaker(name);
                document.getElementById('speakerDock').appendChild(chip);
                if (navigator.vibrate) navigator.vibrate(50);
                setTimeout(closeRegisterModal, 1000);
            }
        }
    }

    function tick() {
        totalSeconds++;
        document.getElementById('totalCost').innerText = Math.floor((totalSeconds * 20000) / 3600).toLocaleString();
        if (timeLeft > 0) timeLeft--; else deviationScore += 0.4;
        deviationScore = Math.min(100, deviationScore + 0.05);
        updateUI();
    }

    function processMeetingSpeech(text) {
        const logBox = document.getElementById('fullLog');
        const entry = document.createElement('div');
        const time = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
        entry.innerHTML = `<span class="text-slate-300 mr-2">${time}</span>${currentSpeaker ? '<b class="text-blue-600">['+currentSpeaker+']</b> ' : ''}${text}`;
        logBox.prepend(entry);
        if (text.includes("決定") || text.includes("タスク")) addSummaryCard(text, time);
    }

    function addSummaryCard(text, time) {
        const box = document.getElementById('summaryLog');
        const card = document.createElement('div');
        card.className = "bg-white p-5 rounded-2xl border-l-8 border-emerald-500 card-shadow border border-slate-100";
        card.innerHTML = `<div class="flex justify-between items-center mb-2"><span class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">Decision / Action</span><span class="text-[10px] text-slate-300">${time}</span></div><p class="text-sm text-slate-800 font-bold leading-relaxed">${text}</p>`;
        box.prepend(card);
    }

    function setSpeaker(n) {
        currentSpeaker = n;
        document.querySelectorAll('.speaker-chip').forEach(b => {
            b.classList.toggle('active', b.innerText === n || (n === null && b.id === 'btn-default'));
        });
    }

    function updateUI() {
        const circle = document.getElementById('devCircle'), circum = 691;
        circle.style.strokeDashoffset = circum - (deviationScore/100) * circum;
        document.getElementById('devPercent').innerText = `Deviation ${Math.floor(deviationScore)}%`;
        circle.style.color = deviationScore > 80 ? "#e11d48" : (deviationScore > 40 ? "#f59e0b" : "#2563eb");
        const m = Math.floor(Math.abs(timeLeft)/60).toString().padStart(2,'0'), s = (Math.abs(timeLeft)%60).toString().padStart(2,'0');
        document.getElementById('timerDisplay').innerText = `${m}:${s}`;
    }

    function toggleReport() { document.getElementById('reportDrawer').classList.toggle('open'); }
    function openRegisterModal() { document.getElementById('registerModal').classList.remove('hidden'); }
    function closeRegisterModal() { 
        isRegistering = false;
        document.getElementById('registerModal').classList.add('hidden');
        document.getElementById('regIndicator').className = "w-24 h-24 rounded-full bg-slate-50 mx-auto mb-6 flex items-center justify-center text-4xl text-slate-300 border-2 border-slate-100 transition-all";
        document.getElementById('regBtn').innerText = "聞き取り開始";
    }
</script>
</body>
</html>
