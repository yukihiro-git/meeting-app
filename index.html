<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GIPS Ultimate Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@400;900&display=swap');
        body { background-color: #05070a; color: #e2e8f0; font-family: 'Noto Sans JP', sans-serif; height: 100vh; overflow: hidden; }
        .font-mono-ai { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* 議題トレイ */
        #agendaTray { transform: translateY(-100%); transition: transform 0.4s ease; }
        #agendaTray.open { transform: translateY(0); }

        /* 議事録ドロワー */
        #reportDrawer { transform: translateY(calc(100% - 60px)); transition: transform 0.4s ease; }
        #reportDrawer.open { transform: translateY(20%); }

        .speaker-chip { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        .speaker-chip.active { background: #3b82f6; border-color: #60a5fa; color: white; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col">

    <header class="p-4 pt-10 flex justify-between items-center z-50 glass rounded-b-2xl">
        <div onclick="toggleAgendaTray()" class="flex-1 overflow-hidden">
            <p id="agendaIndex" class="text-[8px] font-mono-ai text-blue-400 uppercase tracking-widest">Agenda 1/1 ▼</p>
            <h2 id="currentTitle" class="text-sm font-black text-white truncate">議題未設定（タップで登録）</h2>
        </div>
        <div class="text-right ml-4">
            <p class="text-[8px] font-bold text-rose-500 uppercase">Lost Cost</p>
            <p class="text-lg font-mono-ai font-bold text-rose-500">¥<span id="totalCost">0</span></p>
        </div>
    </header>

    <div id="agendaTray" class="fixed inset-x-0 top-0 pt-28 pb-6 px-6 glass z-40 rounded-b-3xl shadow-2xl">
        <div id="agendaList" class="space-y-2 mb-4 max-h-[25vh] overflow-y-auto pr-2"></div>
        <div class="flex gap-2">
            <button onclick="addAgendaRow()" class="flex-1 py-3 border border-dashed border-slate-600 rounded-xl text-xs text-slate-400">+ 追加</button>
            <button onclick="saveAgendas()" class="flex-1 py-3 bg-blue-600 rounded-xl text-xs font-bold text-white">設定完了</button>
        </div>
    </div>

    <main class="flex-1 flex flex-col items-center justify-start pt-6 px-4 z-10">
        <div class="relative flex items-center justify-center scale-90 sm:scale-100">
            <svg class="w-56 h-56">
                <circle class="text-slate-900" stroke-width="4" stroke="currentColor" fill="transparent" r="105" cx="112" cy="112"/>
                <circle id="devCircle" class="text-emerald-500 transition-all duration-700" stroke-width="8" stroke-dasharray="660" stroke-dashoffset="660" stroke-linecap="round" stroke="currentColor" fill="transparent" r="105" cx="112" cy="112"/>
            </svg>
            <div class="absolute flex flex-col items-center">
                <span id="timerDisplay" class="text-5xl font-mono-ai font-bold text-white">00:00</span>
                <span id="devPercent" class="text-[9px] font-mono-ai text-slate-500 mt-1 uppercase tracking-widest">Deviation 0%</span>
            </div>
        </div>

        <div class="w-full mt-4 space-y-4">
            <div id="liveTranscript" class="text-[11px] text-center text-blue-300 italic min-h-[30px] px-6">Ready to record...</div>
            
            <div class="flex items-center gap-2 overflow-x-auto no-scrollbar pb-2">
                <button onclick="setSpeaker(null)" id="btn-default" class="speaker-chip active px-4 py-2 rounded-xl text-[10px] font-bold">全員</button>
                <div id="dynamicSpeakers" class="flex gap-2"></div>
                <button onclick="openRegisterModal()" class="px-4 py-2 rounded-xl border border-dashed border-blue-500/50 text-blue-400 text-[10px] font-bold">
                    <i class="fa-solid fa-user-plus mr-1"></i> 話者追加
                </button>
            </div>
        </div>
    </main>

    <div id="reportDrawer" class="fixed inset-0 glass z-30 rounded-t-[30px] flex flex-col">
        <div onclick="toggleReport()" class="h-[50px] flex flex-col items-center justify-center cursor-pointer">
            <div class="w-8 h-1 bg-slate-700 rounded-full"></div>
            <span class="text-[8px] font-bold text-slate-500 uppercase mt-2 tracking-widest">Minutes & Log</span>
        </div>
        <div class="flex-1 overflow-y-auto px-6 pb-40">
            <div id="summaryLog" class="space-y-3 pt-2"></div>
            <div id="fullLog" class="mt-6 pt-6 border-t border-slate-800 space-y-1 font-mono text-[10px] text-slate-500"></div>
        </div>
    </div>

    <div class="fixed bottom-10 left-0 w-full px-6 flex gap-3 z-50">
        <button id="mainBtn" onclick="toggleMeeting()" class="flex-[3] h-14 bg-blue-600 rounded-2xl flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all">
            <i class="fa-solid fa-play text-white"></i>
            <span class="font-black text-white text-sm uppercase tracking-widest">Start</span>
        </button>
        <button onclick="nextAgenda()" id="nextBtn" class="flex-1 h-14 glass rounded-2xl flex items-center justify-center text-slate-400 active:bg-slate-800 disabled:opacity-20" disabled>
            <i class="fa-solid fa-forward-step"></i>
        </button>
    </div>

    <div id="registerModal" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-center justify-center p-8 backdrop-blur-md">
        <div class="w-full glass p-8 rounded-[30px] text-center">
            <div id="regIcon" class="w-16 h-16 rounded-full bg-slate-800 mx-auto mb-4 flex items-center justify-center text-2xl text-slate-600"><i class="fa-solid fa-microphone"></i></div>
            <h3 class="text-lg font-black text-white mb-2 tracking-tighter uppercase">Speaker Registration</h3>
            <p class="text-[10px] text-slate-400 mb-6 leading-relaxed">「私は〇〇です」と名乗ってください。<br>AIがボタンを自動生成します。</p>
            <p id="regResult" class="text-blue-400 font-bold mb-6 italic text-xs h-4">...Waiting...</p>
            <button id="regBtn" onclick="startAutoRegister()" class="w-full py-4 bg-blue-600 text-white font-black rounded-xl shadow-lg uppercase tracking-widest text-sm">聞き取り開始</button>
            <button onclick="closeRegisterModal()" class="w-full py-3 text-slate-500 font-bold text-[10px] mt-2">CLOSE</button>
        </div>
    </div>

<script>
    let isRunning = false, isRegistering = false, currentIdx = 0, totalSeconds = 0, deviationScore = 0, recognition, timerInterval, timeLeft = 0, agendas = [];
    let currentSpeaker = null, speakers = [];

    window.onload = () => {
        addAgendaRow("議題1", 10);
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'ja-JP';
            recognition.onresult = (e) => {
                let final = "", interim = "";
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) final += e.results[i][0].transcript;
                    else interim += e.results[i][0].transcript;
                }
                if (isRegistering && final) processAutoRegister(final);
                if (isRunning) {
                    if (interim) document.getElementById('liveTranscript').innerText = interim;
                    if (final) processMeetingSpeech(final);
                }
            };
            recognition.onend = () => { if(isRunning || isRegistering) recognition.start(); };
        }
    };

    function toggleAgendaTray() { document.getElementById('agendaTray').classList.toggle('open'); }
    function addAgendaRow(title="", time=10) {
        const div = document.createElement('div');
        div.className = "flex gap-2 items-center agenda-row";
        div.innerHTML = `<input type="text" placeholder="議題" value="${title}" class="flex-[3] bg-slate-900 border border-slate-700 rounded-lg p-3 text-xs text-white outline-none"><input type="number" value="${time}" class="flex-[1] bg-slate-900 border border-slate-700 rounded-lg p-3 text-xs text-white outline-none font-mono-ai">`;
        document.getElementById('agendaList').appendChild(div);
    }
    function saveAgendas() {
        const rows = document.querySelectorAll('.agenda-row');
        agendas = Array.from(rows).map(r => ({ title: r.querySelectorAll('input')[0].value || "未設定", time: parseInt(r.querySelectorAll('input')[1].value) || 1 }));
        currentIdx = 0; updateAgendaUI(); toggleAgendaTray();
        document.getElementById('nextBtn').disabled = agendas.length <= 1;
    }
    function updateAgendaUI() {
        const a = agendas[currentIdx];
        document.getElementById('currentTitle').innerText = a.title;
        document.getElementById('agendaIndex').innerText = `Agenda ${currentIdx+1}/${agendas.length} ▼`;
        timeLeft = a.time * 60; updateUI();
    }

    function toggleMeeting() {
        const btn = document.getElementById('mainBtn');
        if (!isRunning) {
            if(agendas.length === 0) { saveAgendas(); }
            isRunning = true; btn.innerHTML = '<i class="fa-solid fa-stop"></i> <span class="uppercase">Finish</span>';
            btn.classList.replace('bg-blue-600', 'bg-rose-600');
            recognition.start(); timerInterval = setInterval(tick, 1000);
        } else {
            isRunning = false; btn.innerHTML = '<i class="fa-solid fa-play"></i> <span class="uppercase">Start</span>';
            btn.classList.replace('bg-rose-600', 'bg-blue-600');
            recognition.stop(); clearInterval(timerInterval);
        }
    }

    function tick() {
        totalSeconds++;
        document.getElementById('totalCost').innerText = Math.floor((totalSeconds * 12000) / 3600).toLocaleString();
        if (timeLeft > 0) timeLeft--; else deviationScore += 0.5;
        deviationScore = Math.min(100, deviationScore + 0.05);
        updateUI();
    }

    function processMeetingSpeech(text) {
        const time = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
        const logBox = document.getElementById('fullLog');
        const entry = document.createElement('div');
        entry.innerHTML = `<span class="opacity-30 mr-2">${time}</span>${currentSpeaker ? '<b>['+currentSpeaker+']</b> ' : ''}${text}`;
        logBox.prepend(entry);

        if (text.includes("決定") || text.includes("期限") || text.includes("タスク")) {
            addSummaryCard(text, time, "決定事項", "fa-check-circle text-emerald-500");
            deviationScore = Math.max(0, deviationScore - 15);
        } else if (text.includes("課題") || text.includes("問題")) {
            addSummaryCard(text, time, "課題・論点", "fa-circle-exclamation text-amber-400");
        }
        updateUI();
    }

    function addSummaryCard(text, time, title, icon) {
        const box = document.getElementById('summaryLog');
        const card = document.createElement('div');
        card.className = "bg-slate-800/50 p-3 rounded-xl border-l-4 border-blue-500";
        card.innerHTML = `<div class="flex justify-between items-center mb-1"><span class="text-[8px] font-bold text-slate-500 uppercase"><i class="fa-solid ${icon} mr-1"></i> ${title}</span><span class="text-[8px] text-slate-600">${time}</span></div><p class="text-[11px] text-slate-200">${currentSpeaker ? '<b>'+currentSpeaker+':</b> ' : ''}${text}</p>`;
        box.prepend(card);
    }

    function startAutoRegister() { isRegistering = true; recognition.start(); document.getElementById('regIcon').classList.add('text-rose-500', 'animate-pulse'); }
    function processAutoRegister(text) {
        let name = text.replace(/私は|です|と申します|と言います/g, "").trim();
        if (name.length > 0 && name.length < 8) {
            if(!speakers.includes(name)) {
                speakers.push(name);
                const btn = document.createElement('button');
                btn.className = "speaker-chip px-4 py-2 rounded-xl text-[10px] font-bold bg-slate-800 text-slate-400";
                btn.innerText = name; btn.onclick = () => setSpeaker(name);
                document.getElementById('dynamicSpeakers').appendChild(btn);
            }
            document.getElementById('regResult').innerText = `Registered: ${name}`;
        }
    }
    function setSpeaker(n) {
        currentSpeaker = n;
        document.querySelectorAll('.speaker-chip').forEach(b => b.classList.toggle('active', b.innerText === n || (n === null && b.id === 'btn-default')));
    }

    function updateUI() {
        const m = Math.floor(Math.abs(timeLeft)/60).toString().padStart(2,'0'), s = (Math.abs(timeLeft)%60).toString().padStart(2,'0');
        document.getElementById('timerDisplay').innerText = `${m}:${s}`;
        const circle = document.getElementById('devCircle'), circum = 660;
        circle.style.strokeDashoffset = circum - (deviationScore/100) * circum;
        document.getElementById('devPercent').innerText = `Deviation ${Math.floor(deviationScore)}%`;
        circle.style.color = deviationScore > 80 ? "#f43f5e" : (deviationScore > 40 ? "#fbbf24" : "#10b981");
    }
    function toggleReport() { document.getElementById('reportDrawer').classList.toggle('open'); }
    function openRegisterModal() { document.getElementById('registerModal').classList.remove('hidden'); }
    function closeRegisterModal() { isRegistering = false; document.getElementById('registerModal').classList.add('hidden'); }
    function nextAgenda() { if(currentIdx < agendas.length-1) { currentIdx++; updateAgendaUI(); deviationScore = Math.max(0, deviationScore-20); } }
</script>
</body>
</html>
