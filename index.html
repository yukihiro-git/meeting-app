<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GIPS PREMIER FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Noto+Sans+JP:wght@400;700;900&family=Orbitron:wght@700&display=swap');
        
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; height: 100vh; overflow: hidden; }
        .font-mono-ai { font-family: 'Orbitron', sans-serif; }
        
        /* プレミアム・カードデザイン */
        .glass-card { background: #fff; border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 10px 30px -5px rgba(0,0,0,0.06); border-radius: 32px; }
        
        /* 話者チップ */
        .speaker-dock { display: flex; gap: 12px; overflow-x: auto; padding: 16px 20px; background: #fff; border-bottom: 1px solid #f1f5f9; }
        .speaker-chip { flex: 0 0 auto; padding: 10px 20px; border-radius: 18px; background: #f8fafc; font-size: 13px; font-weight: 800; border: 2px solid #f1f5f9; color: #94a3b8; transition: 0.3s; }
        .speaker-chip.active { background: #2563eb; color: #fff; border-color: #2563eb; box-shadow: 0 8px 16px rgba(37, 99, 235, 0.2); }

        /* 議題モーダル：最高優先度 */
        #agendaModal { position: fixed; inset: 0; background: #fff; z-index: 999; display: none; flex-direction: column; }
        #agendaModal.open { display: flex !important; }

        /* 音声ビジュアライザー：絶対に隠れない位置 */
        .vis-bar { width: 4px; height: 4px; background: #2563eb; border-radius: 2px; transition: height 0.1s ease; }

        /* レポートドロワー */
        #reportDrawer { position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh; background: #fff; transform: translateY(calc(100% - 65px)); transition: transform 0.5s cubic-bezier(0.1, 0.8, 0.1, 1); z-index: 100; border-radius: 40px 40px 0 0; box-shadow: 0 -20px 50px rgba(0,0,0,0.05); }
        #reportDrawer.open { transform: translateY(10%); }
        
        .tab-btn { position: relative; font-weight: 800; font-size: 14px; color: #94a3b8; padding: 12px 0; }
        .tab-btn.active { color: #2563eb; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background: #2563eb; border-radius: 10px; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col">

    <div class="pt-10 bg-white shadow-sm z-[50]">
        <div class="speaker-dock no-scrollbar" id="speakerDock">
            <button onclick="setSpeaker(null)" id="btn-default" class="speaker-chip active">Everyone</button>
        </div>
    </div>

    <main class="flex-1 flex flex-col p-6 space-y-4 overflow-hidden">
        
        <div id="agendaTrigger" onclick="openAgendaModal()" class="glass-card p-5 flex justify-between items-center border-l-[10px] border-l-blue-600 active:scale-95 transition-all cursor-pointer">
            <div class="flex-1 overflow-hidden pointer-events-none">
                <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest flex items-center gap-1">
                    <i class="fa-solid fa-sliders text-[8px]"></i> SETTINGS
                </p>
                <h2 id="currentTitle" class="text-xl font-black text-slate-800 truncate">議題を設定（タップ）</h2>
            </div>
            <div class="text-right border-l pl-4 pointer-events-none">
                <p class="text-[8px] font-bold text-rose-500 font-mono-ai uppercase">Cost</p>
                <p class="text-xl font-mono-ai font-black text-slate-900">¥<span id="totalCost">0</span></p>
            </div>
        </div>

        <div class="relative flex flex-col items-center justify-center py-6 glass-card">
            <svg class="w-60 h-60 transform -rotate-90">
                <circle class="text-slate-100" stroke-width="8" stroke="currentColor" fill="transparent" r="105" cx="120" cy="120"/>
                <circle id="devCircle" class="text-blue-600 transition-all duration-700" stroke-width="12" stroke-dasharray="660" stroke-dashoffset="660" stroke-linecap="round" stroke="currentColor" fill="transparent" r="105" cx="120" cy="120"/>
            </svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center">
                <span id="timerDisplay" class="text-6xl font-mono-ai font-black text-slate-900 tracking-tighter">00:00</span>
                <div id="visualizer" class="flex gap-1.5 mt-4 h-6 items-center">
                    <div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[32px] p-6 flex-1 flex items-center justify-center bg-blue-50/20 border-dashed border-2 border-blue-100">
            <p id="liveTranscript" class="text-sm text-blue-800 font-bold italic text-center">Startボタンで記録を開始します</p>
        </div>
    </main>

    <div id="reportDrawer">
        <div onclick="toggleReport()" class="h-[60px] flex flex-col items-center justify-center cursor-pointer">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mb-1"></div>
        </div>
        <div class="flex px-8 border-b border-slate-50">
            <button onclick="switchTab('summary')" id="tab-summary-btn" class="tab-btn active flex-1">AI要約</button>
            <button onclick="switchTab('logs')" id="tab-logs-btn" class="tab-btn flex-1">全発言</button>
        </div>
        <div class="flex-1 overflow-y-auto px-8 pb-48 pt-4">
            <div id="tab-summary" class="space-y-4"></div>
            <div id="tab-logs" class="hidden space-y-2 font-mono text-[11px] text-slate-400"></div>
        </div>
    </div>

    <div class="fixed bottom-10 left-0 w-full px-8 flex gap-4 z-[200]">
        <button id="mainBtn" onclick="toggleMeeting()" class="flex-[3] h-20 bg-slate-900 text-white rounded-[32px] flex items-center justify-center gap-4 shadow-2xl active:scale-95 transition-all">
            <i class="fa-solid fa-play text-xl"></i><span class="text-lg font-black uppercase tracking-widest">Start</span>
        </button>
        <button onclick="openRegisterModal()" class="flex-1 h-20 bg-white text-blue-600 rounded-[32px] flex items-center justify-center border-2 border-blue-50 shadow-xl active:scale-95 transition-all">
            <i class="fa-solid fa-user-plus text-2xl"></i>
        </button>
    </div>

    <div id="agendaModal">
        <div class="p-8 pt-16 flex justify-between items-center border-b bg-white sticky top-0">
            <h3 class="text-2xl font-black italic">Agenda Configuration</h3>
            <button onclick="closeAgendaModal()" class="text-slate-300 text-4xl p-2"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-8 space-y-10 bg-slate-50">
            <section>
                <div class="flex justify-between items-end mb-6 font-bold text-slate-400 text-xs uppercase"><span>Topic List</span><button onclick="addAgendaRow()" class="text-blue-600">+ Add</button></div>
                <div id="agendaInputList" class="space-y-4"></div>
            </section>
            <section class="pb-32">
                <h4 class="font-bold text-slate-400 text-xs uppercase mb-4">NG Keywords</h4>
                <input type="text" id="ngWordsInput" value="検討します,難しい,できない" class="w-full bg-white border-2 border-slate-100 rounded-[24px] p-5 font-bold text-rose-500 outline-none">
            </section>
        </div>
        <div class="p-8 bg-white border-t pb-12 shadow-2xl">
            <button onclick="saveAgendas()" class="w-full py-6 bg-blue-600 text-white font-black rounded-[32px] text-xl active:scale-95">設定を保存して戻る</button>
        </div>
    </div>

    <div id="registerModal" class="fixed inset-0 bg-slate-900/50 z-[1000] hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="w-full max-w-sm bg-white p-10 rounded-[50px] shadow-2xl text-center border-2 border-white">
            <div id="regIndicator" class="w-20 h-20 rounded-full bg-slate-50 mx-auto mb-6 flex items-center justify-center text-3xl text-slate-300 border-4 border-slate-50 transition-all"><i class="fa-solid fa-microphone"></i></div>
            <h3 class="text-xl font-black text-slate-900 mb-2">話者の登録</h3>
            <p class="text-sm text-slate-500 mb-6 leading-relaxed">「私は〇〇です」と話してください</p>
            <div class="bg-blue-50 rounded-2xl p-6 mb-8 min-h-[100px] flex items-center justify-center border border-blue-100 italic">
                <p id="regLiveText" class="text-blue-600 font-bold">音声入力を待機中...</p>
            </div>
            <button onclick="startAutoRegister()" class="w-full py-5 bg-blue-600 text-white font-black rounded-3xl shadow-xl mb-4">聞き取り開始</button>
            <button onclick="closeRegisterModal()" class="text-slate-400 font-bold text-xs uppercase">Cancel</button>
        </div>
    </div>

<script>
    let isRunning = false, isRegistering = false, currentIdx = 0, totalSeconds = 0, deviationScore = 0, recognition, timerInterval, timeLeft = 0, agendas = [];
    let currentSpeaker = null, speakers = [];
    let audioContext, analyser, dataArray, source;
    let ngWords = ["検討します", "難しい", "できない"];

    window.onload = () => {
        addAgendaRow("進捗の共有", 10);
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'ja-JP';
            recognition.onresult = (e) => {
                let final = "", interim = "";
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) final += e.results[i][0].transcript;
                    else interim += e.results[i][0].transcript;
                }
                
                // 修正：登録時の文字プレビューを確実に表示
                if (isRegistering) {
                    const text = interim || final;
                    if(text) document.getElementById('regLiveText').innerText = text;
                    if (final) processAutoRegister(final);
                }
                
                if (isRunning) {
                    if (interim) document.getElementById('liveTranscript').innerText = interim;
                    if (final) processMeetingSpeech(final);
                }
            };
            recognition.onend = () => { if(isRunning || isRegistering) recognition.start(); };
        }
    };

    // モーダル制御
    function openAgendaModal() { document.getElementById('agendaModal').classList.add('open'); }
    function closeAgendaModal() { document.getElementById('agendaModal').classList.remove('open'); }
    function openRegisterModal() { document.getElementById('registerModal').classList.remove('hidden'); }
    function closeRegisterModal() { isRegistering = false; document.getElementById('registerModal').classList.add('hidden'); }

    function setSpeaker(name) {
        currentSpeaker = name;
        document.querySelectorAll('.speaker-chip').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === name || (name === null && btn.id === 'btn-default'));
        });
    }

    function switchTab(tab) {
        document.getElementById('tab-summary').classList.toggle('hidden', tab !== 'summary');
        document.getElementById('tab-logs').classList.toggle('hidden', tab !== 'logs');
        document.getElementById('tab-summary-btn').classList.toggle('active', tab === 'summary');
        document.getElementById('tab-logs-btn').classList.toggle('active', tab === 'logs');
    }

    // --- ロジック ---
    function saveAgendas() {
        const rows = document.querySelectorAll('.agenda-row');
        agendas = Array.from(rows).map(r => ({ title: r.querySelector('input').value || "未設定", time: parseInt(r.querySelectorAll('input')[1].value) || 1 }));
        ngWords = document.getElementById('ngWordsInput').value.split(',').map(w => w.trim());
        currentIdx = 0; updateAgendaUI(); closeAgendaModal();
    }

    function addAgendaRow(title="", time=10) {
        const div = document.createElement('div');
        div.className = "agenda-row p-6 bg-white rounded-[32px] border-2 border-slate-50 flex flex-col gap-4";
        div.innerHTML = `<input type="text" placeholder="議題タイトル" value="${title}" class="w-full bg-transparent text-xl font-black text-slate-800 outline-none"><div class="flex items-center justify-between"><div class="flex items-center gap-4 bg-slate-50 px-5 py-2.5 rounded-2xl border shadow-inner"><button onclick="this.nextElementSibling.value = Math.max(1, parseInt(this.nextElementSibling.value)-1)" class="text-blue-600"><i class="fa-solid fa-minus"></i></button><input type="number" value="${time}" class="w-10 text-center font-bold bg-transparent outline-none"><button onclick="this.previousElementSibling.value = parseInt(this.previousElementSibling.value)+1" class="text-blue-600"><i class="fa-solid fa-plus"></i></button><span class="text-[10px] font-bold text-slate-300">min</span></div><button onclick="this.closest('.agenda-row').remove()" class="text-rose-300"><i class="fa-solid fa-trash-can"></i></button></div>`;
        document.getElementById('agendaInputList').appendChild(div);
    }

    function processMeetingSpeech(text) {
        const time = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
        const speakerTag = currentSpeaker ? `[${currentSpeaker}]` : "[指定なし]";
        const formatted = `${speakerTag} ${text}`;
        
        // ログ追加
        const logsBox = document.getElementById('tab-logs');
        const entry = document.createElement('div');
        const isNG = ngWords.some(w => text.includes(w));
        entry.className = isNG ? "text-rose-600 font-bold mb-2" : "mb-2";
        entry.innerHTML = `<span class="opacity-20 mr-2">${time}</span>${formatted}`;
        logsBox.prepend(entry);

        // 要約追加
        if (text.includes("決定") || text.includes("タスク") || isNG) {
            const box = document.getElementById('tab-summary');
            const card = document.createElement('div');
            card.className = `p-6 rounded-[32px] border-l-8 ${isNG ? 'border-rose-500 bg-rose-50' : 'border-blue-600 bg-blue-50'} shadow-sm border border-slate-100`;
            card.innerHTML = `<div class="flex justify-between items-center mb-1"><span class="text-[9px] font-black uppercase ${isNG ? 'text-rose-600' : 'text-blue-600'}">${isNG ? 'Intervention' : 'Decision'}</span><span class="text-[9px] text-slate-400">${time}</span></div><p class="text-sm text-slate-800 font-bold">${formatted}</p>`;
            box.prepend(card);
        }
        updateUI();
    }

    async function startVisualizer() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser(); analyser.fftSize = 32;
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            source = audioContext.createMediaStreamSource(stream); source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount); drawVisualizer();
        }
    }
    function drawVisualizer() {
        requestAnimationFrame(drawVisualizer);
        const bars = document.querySelectorAll('#visualizer div');
        if (!isRunning && !isRegistering) { bars.forEach(b => b.style.height = '4px'); return; }
        analyser.getByteFrequencyData(dataArray);
        bars.forEach((b, i) => { b.style.height = Math.max(4, dataArray[i]/2.5) + 'px'; });
    }

    function toggleMeeting() { 
        const btn = document.getElementById('mainBtn'); 
        if(!isRunning) { 
            isRunning = true; startVisualizer(); btn.innerHTML = '<i class="fa-solid fa-stop"></i> <span class="uppercase">Finish</span>'; 
            btn.classList.replace('bg-slate-900', 'bg-rose-600'); recognition.start(); timerInterval = setInterval(tick, 1000); 
        } else { 
            isRunning = false; btn.innerHTML = '<i class="fa-solid fa-play"></i> <span class="uppercase">Start</span>'; 
            btn.classList.replace('bg-rose-600', 'bg-slate-900'); recognition.stop(); clearInterval(timerInterval); 
        } 
    }

    function tick() { totalSeconds++; document.getElementById('totalCost').innerText = Math.floor((totalSeconds * 20000) / 3600).toLocaleString(); if(timeLeft > 0) timeLeft--; else deviationScore = Math.min(100, deviationScore + 0.4); updateUI(); }
    function updateUI() { const m = Math.floor(Math.abs(timeLeft)/60).toString().padStart(2,'0'), s = (Math.abs(timeLeft)%60).toString().padStart(2,'0'); document.getElementById('timerDisplay').innerText = `${m}:${s}`; const c = document.getElementById('devCircle'), circum = 660; c.style.strokeDashoffset = circum - (deviationScore/100) * circum; c.style.color = deviationScore > 80 ? "#e11d48" : (deviationScore > 40 ? "#f59e0b" : "#2563eb"); }
    function updateAgendaUI() { if(agendas[currentIdx]) { document.getElementById('currentTitle').innerText = agendas[currentIdx].title; timeLeft = agendas[currentIdx].time * 60; updateUI(); } }
    function startAutoRegister() { isRegistering = true; startVisualizer(); recognition.start(); document.getElementById('regIndicator').className = "w-20 h-20 rounded-full bg-blue-600 mx-auto mb-6 flex items-center justify-center text-4xl text-white border-4 border-blue-100 animate-pulse"; document.getElementById('regLiveText').innerText = "名乗ってください..."; }
    function processAutoRegister(text) { let name = text.replace(/私は|です|と申します|と言います/g, "").trim(); if (name.length > 1 && name.length < 8) { if(!speakers.includes(name)) { speakers.push(name); const chip = document.createElement('button'); chip.className = "speaker-chip"; chip.innerText = name; chip.onclick = () => setSpeaker(name); document.getElementById('speakerDock').appendChild(chip); setTimeout(closeRegisterModal, 800); } } }
    function toggleReport() { document.getElementById('reportDrawer').classList.toggle('open'); }
</script>
</body>
</html>
