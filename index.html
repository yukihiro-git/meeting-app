<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GIPS PREMIER - REBORN FIXED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Noto+Sans+JP:wght@400;700;900&family=Orbitron:wght@700;900&display=swap');
        
        /* 画面全体を固定し、スクロールを制御 */
        body { 
            background-color: #f8fafc; 
            color: #1e293b; 
            font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 親のスクロールを禁止 */
        }
        .font-mono-ai { font-family: 'Orbitron', sans-serif; }

        /* スピーカーバー */
        .speaker-dock { display: flex; gap: 8px; overflow-x: auto; padding: 12px 20px; background: #fff; border-bottom: 1px solid #f1f5f9; flex-shrink: 0; }
        .speaker-chip { flex: 0 0 auto; padding: 10px 18px; border-radius: 14px; background: #f1f5f9; font-size: 12px; font-weight: 800; border: 2px solid transparent; color: #94a3b8; }
        .speaker-chip.active { background: #2563eb; color: white; border-color: #2563eb; }

        /* メインコンテンツエリア：ここだけが伸びる */
        .content-area { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        /* 下部固定操作エリア：絶対に隠れない */
        .bottom-nav { 
            background: #fff; 
            border-top: 1px solid #e2e8f0;
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
            display: flex;
            gap: 12px;
            flex-shrink: 0;
            z-index: 100;
        }

        .main-btn { flex: 3; height: 60px; background: #0f172a; color: white; border-radius: 20px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .sub-btn { flex: 1; height: 60px; background: #fff; border: 2px solid #f1f5f9; border-radius: 20px; color: #2563eb; display: flex; align-items: center; justify-content: center; }

        /* モーダル */
        #agendaModal, #registerModal { position: fixed; inset: 0; background: white; z-index: 2000; display: none; flex-direction: column; }
        .modal-open { display: flex !important; }
        .vis-bar { width: 4px; height: 4px; background: #2563eb; border-radius: 2px; transition: height 0.1s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="pt-8 bg-white">
        <div class="speaker-dock no-scrollbar" id="speakerDock">
            <button onclick="updateSpeaker(this)" id="btn-default" class="speaker-chip active">全員</button>
        </div>
    </div>

    <div class="content-area no-scrollbar">
        <div class="bg-white p-5 rounded-[28px] border-l-[10px] border-l-blue-600 shadow-sm flex justify-between items-center" onclick="openAgendaModal()">
            <div class="flex-1 overflow-hidden">
                <p class="text-[9px] font-bold text-blue-600 uppercase mb-1 tracking-widest">Active Topic</p>
                <h2 id="currentTitle" class="text-base font-black truncate">議題を設定（タップ）</h2>
            </div>
            <div class="text-right ml-4 pl-4 border-l border-slate-100">
                <p class="text-[8px] font-bold text-rose-500 uppercase">Cost</p>
                <p class="text-xl font-mono-ai font-black">¥<span id="totalCost">0</span></p>
            </div>
        </div>

        <div class="bg-white p-8 rounded-[32px] shadow-sm border border-slate-50 flex flex-col items-center">
            <div id="timerDisplay" class="text-[64px] font-mono-ai font-black text-slate-900 tracking-tighter leading-none mb-4">00:00</div>
            <div class="flex gap-1.5 h-4 items-center" id="visualizer">
                <div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div>
            </div>
        </div>

        <div class="bg-white rounded-[32px] border border-slate-100 shadow-sm flex flex-col overflow-hidden min-h-[300px]">
            <div class="flex border-b border-slate-100">
                <button onclick="switchTab('summary')" id="tab-summary-btn" class="flex-1 py-4 text-xs font-black text-blue-600 border-b-2 border-blue-600">重要要約</button>
                <button onclick="switchTab('logs')" id="tab-logs-btn" class="flex-1 py-4 text-xs font-black text-slate-300 border-b-2 border-transparent">全ログ</button>
            </div>
            <div class="p-6 flex-1 overflow-y-auto no-scrollbar">
                <div id="tab-summary" class="space-y-4"></div>
                <div id="tab-logs" class="hidden space-y-2 font-mono text-[10px] text-slate-400 italic"></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button id="mainBtn" onclick="toggleMeeting()" class="main-btn shadow-xl active:scale-95 transition-all">
            <i class="fa-solid fa-play"></i> START
        </button>
        <button onclick="openRegisterModal()" class="sub-btn shadow-md active:scale-95 transition-all">
            <i class="fa-solid fa-user-plus text-2xl"></i>
        </button>
    </div>

    <div id="agendaModal">
        <div class="p-8 pt-16 flex justify-between items-center border-b">
            <h3 class="text-2xl font-black italic">Agenda Configuration</h3>
            <button onclick="closeAgendaModal()" class="text-slate-300 text-4xl p-2"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-6 space-y-6 bg-slate-50">
            <button onclick="addAgendaRow()" class="w-full py-4 bg-white border-2 border-dashed rounded-2xl text-blue-600 font-bold">+ 議題を追加</button>
            <div id="agendaInputList" class="space-y-4"></div>
            <div class="pt-6 border-t"><p class="text-[10px] font-bold text-rose-500 mb-2 uppercase">NG Words (Alert)</p><input type="text" id="ngWordsInput" value="検討します,難しい,できない" class="w-full border-2 p-4 rounded-2xl font-bold text-rose-500 shadow-sm outline-none"></div>
        </div>
        <div class="p-6 pb-12 bg-white border-t shadow-2xl"><button onclick="saveAgendas()" class="w-full py-5 bg-blue-600 text-white font-black rounded-2xl text-lg active:scale-95">設定を保存して戻る</button></div>
    </div>

    <div id="registerModal">
        <div class="p-8 pt-16 flex justify-between items-center border-b bg-white"><h3 class="text-2xl font-black italic">Speaker ID</h3><button onclick="closeRegisterModal()" class="text-slate-300 text-4xl p-2"><i class="fa-solid fa-xmark"></i></button></div>
        <div class="flex-1 flex flex-col p-8 bg-slate-50 text-center justify-center">
            <div class="bg-white rounded-[40px] p-8 min-h-[160px] flex items-center justify-center border-2 border-slate-100 shadow-inner mb-10 italic">
                <p id="regLiveText" class="text-2xl text-blue-600 font-black">Waiting for voice...</p>
            </div>
            <button onclick="startAutoRegister()" class="w-full py-6 bg-blue-600 text-white font-black rounded-[30px] shadow-xl text-lg">録音開始</button>
        </div>
    </div>

<script>
    let isRunning = false, isRegistering = false, currentIdx = 0, totalSeconds = 0, deviationScore = 0, recognition, timerInterval, timeLeft = 0, agendas = [];
    let currentSpeakerName = "全員"; 
    let audioContext, analyser, dataArray, source;
    let ngWords = ["検討します", "難しい", "できない"];

    // 1回目から確実にタイマーを動かすための初期化
    async function initAudio() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser(); analyser.fftSize = 32;
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            source = audioContext.createMediaStreamSource(stream); source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            drawVisualizer();
        }
        if (audioContext.state === 'suspended') await audioContext.resume();
    }

    window.onload = () => {
        addAgendaRow("進捗の確認", 10);
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'ja-JP';
            recognition.onresult = (e) => {
                let final = "", interim = "";
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) final += e.results[i][0].transcript;
                    else interim += e.results[i][0].transcript;
                }
                if (isRegistering) {
                    document.getElementById('regLiveText').innerText = interim || final;
                    if (final) processAutoRegister(final);
                }
                if (isRunning && final) processMeetingSpeech(final);
            };
            recognition.onend = () => { if(isRunning || isRegistering) recognition.start(); };
        }
    };

    function updateSpeaker(btn) {
        currentSpeakerName = btn.innerText;
        document.querySelectorAll('.speaker-chip').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
    }

    async function toggleMeeting() {
        await initAudio();
        const btn = document.getElementById('mainBtn');
        if (!isRunning) {
            isRunning = true; btn.innerHTML = '<i class="fa-solid fa-stop"></i> FINISH';
            btn.classList.replace('bg-[#0f172a]', 'bg-rose-600');
            recognition.start(); timerInterval = setInterval(tick, 1000);
        } else {
            isRunning = false; btn.innerHTML = '<i class="fa-solid fa-play"></i> START';
            btn.classList.replace('bg-rose-600', 'bg-[#0f172a]');
            recognition.stop(); clearInterval(timerInterval);
        }
    }

    function processMeetingSpeech(text) {
        const time = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
        const formatted = `[${currentSpeakerName}] ${text}`;
        
        const logs = document.getElementById('tab-logs');
        const entry = document.createElement('div');
        const isNG = ngWords.some(w => text.includes(w));
        entry.className = isNG ? "text-rose-600 font-bold p-1 bg-rose-50" : "mb-1";
        entry.innerHTML = `<span class="opacity-30 mr-2">[${time}]</span>${formatted}`;
        logs.prepend(entry);

        if (text.includes("決定") || text.includes("タスク") || isNG) {
            const summary = document.getElementById('tab-summary');
            const card = document.createElement('div');
            card.className = `p-5 rounded-2xl border-l-[10px] ${isNG ? 'border-rose-500 bg-rose-50' : 'border-blue-600 bg-blue-50'} shadow-sm`;
            card.innerHTML = `<p class="text-[9px] font-black uppercase mb-1">${isNG ? 'Intervention' : 'Decision'}</p><p class="text-xs font-bold leading-relaxed">${formatted}</p>`;
            summary.prepend(card);
        }
    }

    function tick() {
        totalSeconds++; document.getElementById('totalCost').innerText = Math.floor((totalSeconds * 20000) / 3600).toLocaleString();
        if(timeLeft > 0) timeLeft--;
        const m = Math.floor(timeLeft/60).toString().padStart(2,'0'), s = (timeLeft%60).toString().padStart(2,'0');
        document.getElementById('timerDisplay').innerText = `${m}:${s}`;
    }

    function addAgendaRow(title="", time=10) {
        const div = document.createElement('div');
        div.className = "agenda-row p-5 bg-white rounded-2xl border flex flex-col gap-3 shadow-sm";
        div.innerHTML = `<input type="text" placeholder="議題名" value="${title}" class="w-full font-black text-lg outline-none"><div class="flex items-center justify-between"><div class="bg-slate-100 p-2 rounded-xl flex items-center gap-3"><input type="number" value="${time}" class="w-12 text-center font-bold bg-transparent"><span>分</span></div><button onclick="this.closest('.agenda-row').remove()" class="text-rose-400 font-bold">削除</button></div>`;
        document.getElementById('agendaInputList').appendChild(div);
    }

    function saveAgendas() {
        const rows = document.querySelectorAll('.agenda-row');
        agendas = Array.from(rows).map(r => ({ title: r.querySelector('input').value || "未設定", time: parseInt(r.querySelector('input[type="number"]').value) || 1 }));
        if(agendas[0]) { document.getElementById('currentTitle').innerText = agendas[0].title; timeLeft = agendas[0].time * 60; }
        document.getElementById('agendaModal').classList.remove('modal-open');
    }

    function switchTab(tab) {
        document.getElementById('tab-summary').classList.toggle('hidden', tab !== 'summary');
        document.getElementById('tab-logs').classList.toggle('hidden', tab !== 'logs');
        document.getElementById('tab-summary-btn').className = tab === 'summary' ? "flex-1 py-4 text-xs font-black text-blue-600 border-b-2 border-blue-600" : "flex-1 py-4 text-xs font-black text-slate-300 border-b-2 border-transparent";
        document.getElementById('tab-logs-btn').className = tab === 'logs' ? "flex-1 py-4 text-xs font-black text-blue-600 border-b-2 border-blue-600" : "flex-1 py-4 text-xs font-black text-slate-300 border-b-2 border-transparent";
    }

    function drawVisualizer() {
        requestAnimationFrame(drawVisualizer);
        const bars = document.querySelectorAll('.vis-bar');
        if (!isRunning && !isRegistering) { bars.forEach(b => b.style.height = '4px'); return; }
        analyser.getByteFrequencyData(dataArray);
        bars.forEach((b, i) => { b.style.height = Math.max(4, dataArray[i]/4) + 'px'; });
    }

    function openAgendaModal() { document.getElementById('agendaModal').classList.add('modal-open'); }
    function closeAgendaModal() { document.getElementById('agendaModal').classList.remove('modal-open'); }
    function openRegisterModal() { document.getElementById('registerModal').classList.add('modal-open'); }
    function closeRegisterModal() { isRegistering = false; document.getElementById('registerModal').classList.remove('modal-open'); }
    function startAutoRegister() { initAudio(); isRegistering = true; recognition.start(); }
    function processAutoRegister(text) {
        let name = text.replace(/私は|です|と申します|と言います/g, "").trim();
        if (name.length > 1 && name.length < 8) {
            if(!speakers.includes(name)) {
                speakers.push(name);
                const chip = document.createElement('button'); chip.className = "speaker-chip"; chip.innerText = name;
                chip.onclick = () => updateSpeaker(chip); document.getElementById('speakerDock').appendChild(chip);
                setTimeout(closeRegisterModal, 1000);
            }
        }
    }
</script>
</body>
</html>
