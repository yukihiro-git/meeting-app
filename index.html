<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GIPS PROFESSIONAL - STABLE FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Noto+Sans+JP:wght@400;700;900&family=Orbitron:wght@700;900&display=swap');
        :root { --blue: #2563eb; --bg: #f8fafc; }
        
        /* 画面を4つのブロックに完全に分割する */
        body { background-color: var(--bg); color: #1e293b; font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .font-mono-ai { font-family: 'Orbitron', sans-serif; }

        /* ブロック1: 話者選択 (高さ固定) */
        .header-speaker { height: 80px; background: #fff; border-bottom: 1px solid #f1f5f9; flex-shrink: 0; padding-top: 10px; }
        .speaker-dock { display: flex; gap: 8px; overflow-x: auto; padding: 0 20px; height: 100%; align-items: center; }
        .speaker-chip { flex: 0 0 auto; padding: 8px 16px; border-radius: 12px; background: #f1f5f9; font-size: 12px; font-weight: 800; color: #94a3b8; transition: 0.2s; border: 2px solid transparent; }
        .speaker-chip.active { background: var(--blue); color: white; border-color: var(--blue); }

        /* ブロック2: 議題とタイマー (高さ固定) */
        .hero-panel { padding: 15px 20px; background: #fff; border-bottom: 2px solid #f1f5f9; flex-shrink: 0; }
        .timer-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }

        /* ブロック3: レポートエリア (ここだけがスクロールする) */
        .report-stage { flex-grow: 1; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; position: relative; }
        .tabs { display: flex; border-bottom: 1px solid #e2e8f0; background: #fff; position: sticky; top: 0; z-index: 50; }
        .tab-btn { flex: 1; padding: 14px; font-weight: 800; font-size: 13px; text-align: center; border-bottom: 3px solid transparent; color: #cbd5e1; }
        .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

        /* ブロック4: 操作ボタン (最下部にベタ付け) */
        .action-tray { height: 100px; background: #fff; border-top: 1px solid #e2e8f0; padding: 0 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; z-index: 100; }
        .btn-main { flex: 3; height: 60px; background: #0f172a; color: white; border-radius: 20px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-sub { flex: 1; height: 60px; background: #f8fafc; color: var(--blue); border: 2px solid #f1f5f9; border-radius: 20px; display: flex; align-items: center; justify-content: center; }

        #agendaModal, #registerModal { position: fixed; inset: 0; background: white; z-index: 1000; display: none; flex-direction: column; }
        .modal-open { display: flex !important; }
        .vis-bar { width: 3px; height: 3px; background: var(--blue); border-radius: 1px; transition: height 0.1s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="header-speaker">
        <div class="speaker-dock no-scrollbar" id="speakerDock">
            <button onclick="updateSpeaker(this)" class="speaker-chip active">全員</button>
        </div>
    </div>

    <div class="hero-panel">
        <div onclick="openAgendaModal()" class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100 flex justify-between items-center mb-2">
            <div class="overflow-hidden">
                <p class="text-[8px] font-black text-blue-600 uppercase mb-0.5">Live Topic</p>
                <h2 id="currentTitle" class="text-sm font-black truncate">議題を設定</h2>
            </div>
            <div class="text-right pl-4 border-l border-blue-100">
                <p class="text-[8px] font-bold text-rose-500 uppercase">Cost</p>
                <p class="text-lg font-mono-ai font-black">¥<span id="totalCost">0</span></p>
            </div>
        </div>
        <div class="timer-row">
            <div class="flex flex-col">
                <span id="timerDisplay" class="text-5xl font-mono-ai font-black leading-none">00:00</span>
                <div class="flex gap-1 h-3 mt-1" id="visualizer">
                    <div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div>
                </div>
            </div>
            <div class="flex-1 ml-4 bg-slate-50 p-2 rounded-xl border border-slate-100 min-h-[40px] flex items-center justify-center">
                <p id="liveTranscript" class="text-[10px] text-blue-800 font-bold italic leading-tight text-center">Waiting...</p>
            </div>
        </div>
    </div>

    <div class="report-stage">
        <div class="tabs">
            <button onclick="switchTab('summary')" id="tab-summary-btn" class="tab-btn active uppercase">重要要約</button>
            <button onclick="switchTab('logs')" id="tab-logs-btn" class="tab-btn uppercase">発言ログ</button>
        </div>
        <div class="p-5 flex-1">
            <div id="tab-summary" class="space-y-4"></div>
            <div id="tab-logs" class="hidden space-y-2 font-mono text-[10px] text-slate-400"></div>
        </div>
    </div>

    <div class="action-tray shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
        <button id="mainBtn" onclick="toggleMeeting()" class="btn-main">
            <i class="fa-solid fa-play"></i> START
        </button>
        <button onclick="openRegisterModal()" class="btn-sub">
            <i class="fa-solid fa-user-plus text-xl"></i>
        </button>
    </div>

    <div id="agendaModal">
        <div class="p-8 pt-12 flex justify-between items-center border-b">
            <h3 class="text-xl font-black italic">Agenda Setup</h3>
            <button onclick="closeAgendaModal()" class="text-slate-300 text-4xl p-2"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-6 space-y-6 bg-slate-50">
            <button onclick="addAgendaRow()" class="w-full py-4 bg-white border-2 border-dashed rounded-2xl text-blue-600 font-bold">+ 議題を追加</button>
            <div id="agendaInputList" class="space-y-4"></div>
            <div class="pt-6 border-t"><p class="text-[10px] font-bold text-rose-500 mb-2 uppercase">NG Words</p><input type="text" id="ngWordsInput" value="検討します,難しい,できない" class="w-full border-2 p-4 rounded-2xl font-bold text-rose-500"></div>
        </div>
        <div class="p-6 pb-12"><button onclick="saveAgendas()" class="w-full py-5 bg-blue-600 text-white font-black rounded-2xl text-lg shadow-xl">保存</button></div>
    </div>

    <div id="registerModal">
        <div class="p-8 pt-12 flex justify-between items-center border-b">
            <h3 class="text-xl font-black italic">Voice ID</h3>
            <button onclick="closeRegisterModal()" class="text-slate-300 text-4xl p-2"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="flex-1 flex flex-col p-8 bg-slate-50 text-center justify-center">
            <div class="bg-white rounded-[40px] p-8 border-2 border-slate-100 shadow-inner mb-10 min-h-[200px] flex items-center justify-center">
                <p id="regLiveText" class="text-2xl text-blue-600 font-black italic">名乗ってください...</p>
            </div>
            <button onclick="startAutoRegister()" class="w-full py-6 bg-blue-600 text-white font-black rounded-[30px] shadow-xl text-lg">録音開始</button>
        </div>
    </div>

<script>
    let isRunning = false, isRegistering = false, currentIdx = 0, totalSeconds = 0, deviationScore = 0, recognition, timerInterval, timeLeft = 0, agendas = [];
    let currentSpeakerName = "全員";
    let audioContext, analyser, dataArray, source;
    let ngWords = ["検討します", "難しい", "できない"];

    async function initAudio() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser(); analyser.fftSize = 32;
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            source = audioContext.createMediaStreamSource(stream); source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount); drawVisualizer();
        }
        if (audioContext.state === 'suspended') await audioContext.resume();
    }

    window.onload = () => {
        addAgendaRow("進捗確認", 10);
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'ja-JP';
            recognition.onresult = (e) => {
                let final = "", interim = "";
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) final += e.results[i][0].transcript;
                    else interim += e.results[i][0].transcript;
                }
                if (isRegistering) {
                    document.getElementById('regLiveText').innerText = interim || final;
                    if (final) processAutoRegister(final);
                }
                if (isRunning) {
                    if (interim) document.getElementById('liveTranscript').innerText = interim;
                    if (final) processMeetingSpeech(final);
                }
            };
            recognition.onend = () => { if(isRunning || isRegistering) recognition.start(); };
        }
    };

    function updateSpeaker(btn) {
        currentSpeakerName = btn.innerText;
        document.querySelectorAll('.speaker-chip').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
    }

    async function toggleMeeting() {
        await initAudio(); // 1回目から動かす
        const btn = document.getElementById('mainBtn');
        if (!isRunning) {
            isRunning = true; btn.innerHTML = '<i class="fa-solid fa-stop"></i> STOP';
            btn.classList.replace('bg-[#0f172a]', 'bg-rose-600');
            recognition.start(); timerInterval = setInterval(tick, 1000);
        } else {
            isRunning = false; btn.innerHTML = '<i class="fa-solid fa-play"></i> START';
            btn.classList.replace('bg-rose-600', 'bg-[#0f172a]');
            recognition.stop(); clearInterval(timerInterval);
        }
    }

    function processMeetingSpeech(text) {
        const time = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
        // 修正：現在選択中の名前を確実に使用
        const formatted = `[${currentSpeakerName}] ${text}`;
        
        const logs = document.getElementById('tab-logs');
        const entry = document.createElement('div');
        const isNG = ngWords.some(w => text.includes(w));
        entry.className = isNG ? "text-rose-600 font-bold p-1" : "mb-1";
        entry.innerHTML = `<span class="opacity-30 mr-2">[${time}]</span>${formatted}`;
        logs.prepend(entry);

        if (text.includes("決定") || text.includes("タスク") || isNG) {
            const summary = document.getElementById('tab-summary');
            const card = document.createElement('div');
            card.className = `p-4 rounded-2xl border-l-8 ${isNG ? 'border-rose-500 bg-rose-50' : 'border-blue-600 bg-blue-50'} shadow-sm`;
            card.innerHTML = `<p class="text-[9px] font-black uppercase mb-1">${isNG ? 'Warning' : 'Decision'}</p><p class="text-xs font-bold leading-relaxed">${formatted}</p>`;
            summary.prepend(card);
        }
    }

    function tick() {
        totalSeconds++; document.getElementById('totalCost').innerText = Math.floor((totalSeconds * 20000) / 3600).toLocaleString();
        if(timeLeft > 0) timeLeft--;
        const m = Math.floor(timeLeft/60).toString().padStart(2,'0'), s = (timeLeft%60).toString().padStart(2,'0');
        document.getElementById('timerDisplay').innerText = `${m}:${s}`;
    }

    function addAgendaRow(title="", time=10) {
        const div = document.createElement('div');
        div.className = "agenda-row p-5 bg-white rounded-2xl border-2 flex flex-col gap-3 shadow-sm";
        div.innerHTML = `<input type="text" placeholder="議題名" value="${title}" class="w-full font-black text-lg outline-none"><div class="flex items-center justify-between"><div class="flex items-center gap-2 bg-slate-50 px-3 py-1 rounded-xl"><input type="number" value="${time}" class="w-12 text-center font-bold text-blue-600 bg-transparent"><span>min</span></div><button onclick="this.closest('.agenda-row').remove()" class="text-rose-400 font-bold">削除</button></div>`;
        document.getElementById('agendaInputList').appendChild(div);
    }

    function saveAgendas() {
        const rows = document.querySelectorAll('.agenda-row');
        agendas = Array.from(rows).map(r => ({ title: r.querySelector('input').value || "未設定", time: parseInt(r.querySelectorAll('input')[1].value) || 1 }));
        if(agendas[0]) { document.getElementById('currentTitle').innerText = agendas[0].title; timeLeft = agendas[0].time * 60; }
        document.getElementById('agendaModal').classList.remove('modal-open');
    }

    function switchTab(tab) {
        document.getElementById('tab-summary').classList.toggle('hidden', tab !== 'summary');
        document.getElementById('tab-logs').classList.toggle('hidden', tab !== 'logs');
        document.getElementById('tab-summary-btn').classList.toggle('active', tab === 'summary');
        document.getElementById('tab-logs-btn').classList.toggle('active', tab === 'logs');
    }

    function drawVisualizer() {
        requestAnimationFrame(drawVisualizer);
        const bars = document.querySelectorAll('.vis-bar');
        if (!isRunning && !isRegistering) return;
        analyser.getByteFrequencyData(dataArray);
        bars.forEach((b, i) => { b.style.height = Math.max(3, dataArray[i]/5) + 'px'; });
    }

    function openAgendaModal() { document.getElementById('agendaModal').classList.add('modal-open'); }
    function closeAgendaModal() { document.getElementById('agendaModal').classList.remove('modal-open'); }
    function openRegisterModal() { document.getElementById('registerModal').classList.add('modal-open'); }
    function closeRegisterModal() { isRegistering = false; document.getElementById('registerModal').classList.remove('modal-open'); }
    function startAutoRegister() { initAudio(); isRegistering = true; recognition.start(); }
    function processAutoRegister(text) {
        let name = text.replace(/私は|です|と申します|と言います/g, "").trim();
        if (name.length > 1 && name.length < 8) {
            if(!speakers.includes(name)) {
                speakers.push(name);
                const chip = document.createElement('button'); chip.className = "speaker-chip"; chip.innerText = name;
                chip.onclick = () => updateSpeaker(chip); document.getElementById('speakerDock').appendChild(chip);
                setTimeout(closeRegisterModal, 1000);
            }
        }
    }
</script>
</body>
</html>
