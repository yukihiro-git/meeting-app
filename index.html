<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GIPS Professional v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { background-color: #f0f4f8; color: #1e293b; font-family: 'Noto Sans JP', sans-serif; height: 100vh; overflow: hidden; transition: background-color 0.3s; }
        .font-mono-ai { font-family: 'Orbitron', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 8px 32px rgba(0,0,0,0.05); }
        
        /* 強制介入フラッシュ */
        .intervention-active { background-color: #fee2e2 !important; animation: flash-red 0.5s infinite alternate; }
        @keyframes flash-red { from { background-color: #fecaca; } to { background-color: #f8fafc; } }

        /* スピーカーチップ */
        .speaker-dock { display: flex; gap: 10px; overflow-x: auto; padding: 12px 20px; background: #fff; border-bottom: 1px solid #e2e8f0; }
        .speaker-chip { flex: 0 0 auto; padding: 10px 20px; border-radius: 16px; background: #f1f5f9; font-size: 13px; font-weight: 700; border: 2px solid #e2e8f0; color: #64748b; transition: 0.2s; }
        .speaker-chip.active { background: #2563eb; color: #fff; border-color: #2563eb; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }

        /* ビジュアライザー */
        .visualizer-container { display: flex; align-items: center; justify-content: center; gap: 4px; height: 24px; }
        .vis-bar { width: 4px; height: 4px; background: #2563eb; border-radius: 2px; transition: height 0.1s ease; }

        /* ドロワー */
        #reportDrawer { position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh; background: #fff; transform: translateY(calc(100% - 60px)); transition: transform 0.5s cubic-bezier(0.1, 0.8, 0.1, 1); z-index: 80; border-radius: 40px 40px 0 0; }
        #reportDrawer.open { transform: translateY(10%); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col">

    <div class="pt-10 bg-white">
        <div class="speaker-dock no-scrollbar" id="speakerDock">
            <button onclick="setSpeaker(null)" id="btn-default" class="speaker-chip active">全員</button>
        </div>
    </div>

    <main class="flex-1 flex flex-col p-6 overflow-hidden space-y-4">
        <div class="flex justify-between items-center" onclick="openAgendaModal()">
            <div class="flex-1">
                <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Active Agenda</p>
                <h2 id="currentTitle" class="text-xl font-black text-slate-800 leading-tight truncate">議題を設定してください</h2>
            </div>
            <div class="glass-card px-4 py-2 rounded-2xl border-l-4 border-rose-500">
                <p class="text-[8px] font-bold text-rose-500 uppercase font-mono-ai">Cost</p>
                <p class="text-xl font-mono-ai font-bold text-slate-800">¥<span id="totalCost">0</span></p>
            </div>
        </div>

        <div class="relative flex flex-col items-center justify-center py-4 bg-white rounded-[40px] shadow-sm border border-slate-100">
            <svg class="w-56 h-56 transform -rotate-90">
                <circle class="text-slate-100" stroke-width="8" stroke="currentColor" fill="transparent" r="100" cx="112" cy="112"/>
                <circle id="devCircle" class="text-blue-600 transition-all duration-700" stroke-width="10" stroke-dasharray="628" stroke-dashoffset="628" stroke-linecap="round" stroke="currentColor" fill="transparent" r="100" cx="112" cy="112"/>
            </svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center">
                <span id="timerDisplay" class="text-6xl font-mono-ai font-bold text-slate-900 tracking-tighter">00:00</span>
                <div id="visualizer" class="visualizer-container mt-2">
                    <div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-[32px] p-5 flex-1 flex flex-col overflow-hidden border border-white/50">
            <p id="liveTranscript" class="text-sm text-slate-500 italic text-center my-auto leading-relaxed">音声を待機中...</p>
        </div>
    </main>

    <div id="reportDrawer" class="shadow-2xl border-t border-slate-100">
        <div onclick="toggleReport()" class="h-[60px] flex flex-col items-center justify-center cursor-pointer">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mb-1"></div>
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Reports</span>
        </div>
        <div class="flex-1 overflow-y-auto px-6 pb-48">
            <div id="summaryLog" class="space-y-4 pt-2"></div>
            <div id="fullLog" class="mt-10 pt-8 border-t border-slate-100 space-y-3 font-mono text-[11px] text-slate-400"></div>
        </div>
    </div>

    <div class="fixed bottom-10 left-0 w-full px-8 flex gap-4 z-[90]">
        <button id="mainBtn" onclick="toggleMeeting()" class="flex-[3] h-20 bg-blue-600 text-white rounded-[28px] flex items-center justify-center gap-4 shadow-xl active:scale-95 transition-all">
            <i class="fa-solid fa-play text-xl"></i><span class="text-lg font-black uppercase tracking-widest">Start Meeting</span>
        </button>
        <button onclick="openRegisterModal()" class="flex-1 h-20 bg-white text-blue-600 rounded-[28px] flex items-center justify-center border-2 border-blue-50 shadow-lg active:scale-95 transition-all">
            <i class="fa-solid fa-microphone-lines text-2xl"></i>
        </button>
    </div>

    <div id="registerModal" class="fixed inset-0 bg-slate-900/40 z-[150] hidden flex items-center justify-center p-6 backdrop-blur-lg">
        <div class="w-full bg-white p-10 rounded-[48px] shadow-2xl text-center border-2 border-white">
            <div id="regIndicator" class="w-24 h-24 rounded-full bg-slate-50 mx-auto mb-6 flex items-center justify-center text-4xl text-slate-300 border-4 border-slate-50 transition-all"><i class="fa-solid fa-microphone"></i></div>
            <h3 class="text-2xl font-black text-slate-900 mb-2">話者登録</h3>
            
            <div class="bg-blue-50/50 rounded-2xl p-4 mb-8 border border-blue-100 min-h-[60px] flex items-center justify-center">
                <p id="regLiveText" class="text-sm text-blue-600 font-bold italic tracking-tight">「私は〇〇です」と話してください</p>
            </div>

            <button id="regBtn" onclick="startAutoRegister()" class="w-full py-5 bg-blue-600 text-white font-black rounded-3xl shadow-xl mb-4 text-lg">登録開始</button>
            <button onclick="closeRegisterModal()" class="text-slate-400 font-bold text-sm">キャンセル</button>
        </div>
    </div>

    <div id="agendaModal" class="fixed inset-0 bg-white z-[200] hidden flex-col">
        <div class="p-8 pt-16 flex justify-between items-center border-b">
            <h3 class="text-2xl font-black">議題設定 / NGワード</h3>
            <button onclick="closeAgendaModal()" class="text-slate-300 text-3xl"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-8 space-y-8">
            <section>
                <div class="flex justify-between items-end mb-4"><h4 class="font-bold text-slate-400 text-xs uppercase tracking-widest">Agendas</h4><button onclick="addAgendaRow()" class="text-blue-600 text-sm font-bold">+ 追加</button></div>
                <div id="agendaInputList" class="space-y-4"></div>
            </section>
            <section>
                <h4 class="font-bold text-slate-400 text-xs uppercase tracking-widest mb-4">NG Words (強制介入対象)</h4>
                <input type="text" id="ngWordsInput" value="検討します,難しい,できない" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold text-rose-500 outline-none focus:border-rose-300">
                <p class="text-[10px] text-slate-400 mt-2 px-2">※カンマ区切りで入力してください</p>
            </section>
        </div>
        <div class="p-8 bg-slate-50 border-t pb-12">
            <button onclick="saveAgendas()" class="w-full py-6 bg-blue-600 text-white font-black rounded-[32px] text-xl shadow-2xl">設定を保存して戻る</button>
        </div>
    </div>

<script>
    let isRunning = false, isRegistering = false, currentIdx = 0, totalSeconds = 0, deviationScore = 0, recognition, timerInterval, timeLeft = 0, agendas = [];
    let currentSpeaker = null, speakers = [];
    let audioContext, analyser, dataArray, source;
    let ngWords = ["検討します", "難しい", "できない"];

    window.onload = () => {
        addAgendaRow("議題1", 10);
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'ja-JP';
            recognition.onresult = (e) => {
                let final = "", interim = "";
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) final += e.results[i][0].transcript;
                    else interim += e.results[i][0].transcript;
                }
                
                if (isRegistering) {
                    document.getElementById('regLiveText').innerText = interim || final || "聞き取り中...";
                    if (final) processAutoRegister(final);
                }
                
                if (isRunning) {
                    if (interim) document.getElementById('liveTranscript').innerText = interim;
                    if (final) processMeetingSpeech(final);
                }
            };
            recognition.onend = () => { if(isRunning || isRegistering) recognition.start(); };
        }
    };

    // --- NGワード検知・強制介入 ---
    function checkIntervention(text) {
        const found = ngWords.find(word => text.includes(word));
        if (found) {
            document.body.classList.add('intervention-active');
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            
            // 警告音 (Simple Beep)
            const osc = new AudioContext().createOscillator();
            const gain = new AudioContext().createGain();
            osc.connect(gain); gain.connect(new AudioContext().destination);
            osc.type = 'square'; osc.frequency.setValueAtTime(440, 0);
            gain.gain.setValueAtTime(0.1, 0); osc.start(); osc.stop(0.2);

            setTimeout(() => document.body.classList.remove('intervention-active'), 3000);
            return true;
        }
        return false;
    }

    // --- 会議処理 ---
    function processMeetingSpeech(text) {
        const time = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
        const speakerName = currentSpeaker || "不明";
        const formattedText = `[${speakerName}] ${text}`;
        
        // 全ログ
        const logBox = document.getElementById('fullLog');
        const entry = document.createElement('div');
        const isNG = checkIntervention(text);
        entry.className = isNG ? "text-rose-500 font-bold" : "";
        entry.innerHTML = `<span class="opacity-30 mr-2">${time}</span>${formattedText}`;
        logBox.prepend(entry);

        // 要約抽出
        if (text.includes("決定") || text.includes("タスク") || text.includes("期限") || isNG) {
            addSummaryCard(formattedText, time, isNG);
            if (!isNG) deviationScore = Math.max(0, deviationScore - 15);
        }
        updateUI();
    }

    function addSummaryCard(text, time, isNG) {
        const box = document.getElementById('summaryLog');
        const card = document.createElement('div');
        const type = isNG ? "NG WORD ALERT" : "DECISION / ACTION";
        const color = isNG ? "border-rose-500 bg-rose-50" : "border-emerald-500 bg-emerald-50";
        card.className = `p-5 rounded-3xl border-l-8 ${color} shadow-sm animate-slide-in`;
        card.innerHTML = `<div class="flex justify-between items-center mb-1"><span class="text-[9px] font-black uppercase tracking-widest ${isNG ? 'text-rose-600' : 'text-emerald-600'}">${type}</span><span class="text-[9px] text-slate-400">${time}</span></div><p class="text-sm text-slate-800 leading-relaxed font-bold">${text}</p>`;
        box.prepend(card);
    }

    // --- UI Helpers ---
    function startAutoRegister() {
        isRegistering = true; recognition.start();
        document.getElementById('regIndicator').className = "w-24 h-24 rounded-full bg-blue-600 mx-auto mb-6 flex items-center justify-center text-4xl text-white border-4 border-blue-100 animate-pulse";
        document.getElementById('regBtn').innerText = "お名前を聞いています...";
    }

    function processAutoRegister(text) {
        let name = text.replace(/私は|です|と申します|と言います/g, "").trim();
        if (name.length > 1 && name.length < 8) {
            if(!speakers.includes(name)) {
                speakers.push(name);
                const chip = document.createElement('button');
                chip.className = "speaker-chip"; chip.innerText = name;
                chip.onclick = () => setSpeaker(name);
                document.getElementById('speakerDock').appendChild(chip);
                if (navigator.vibrate) navigator.vibrate(50);
                setTimeout(closeRegisterModal, 1000);
            }
        }
    }

    async function startVisualizer() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser(); analyser.fftSize = 32;
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            source = audioContext.createMediaStreamSource(stream); source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount); drawVisualizer();
        }
    }

    function drawVisualizer() {
        requestAnimationFrame(drawVisualizer);
        if (!isRunning && !isRegistering) { document.querySelectorAll('.vis-bar').forEach(b => b.style.height = '4px'); return; }
        analyser.getByteFrequencyData(dataArray);
        document.querySelectorAll('.vis-bar').forEach((b, i) => { b.style.height = Math.max(4, dataArray[i]/3) + 'px'; });
    }

    function saveAgendas() {
        const rows = document.querySelectorAll('.agenda-row');
        agendas = Array.from(rows).map(r => ({ title: r.querySelector('input[type="text"]').value || "未設定", time: parseInt(r.querySelector('input[type="number"]').value) || 1 }));
        ngWords = document.getElementById('ngWordsInput').value.split(',').map(w => w.trim());
        currentIdx = 0; updateAgendaUI(); closeAgendaModal();
    }

    function addAgendaRow(title="", time=10) {
        const div = document.createElement('div');
        div.className = "agenda-row p-6 bg-slate-50 rounded-[32px] border-2 border-slate-100 flex flex-col gap-4";
        div.innerHTML = `<input type="text" placeholder="議題名" value="${title}" class="w-full bg-transparent text-xl font-black text-slate-900 outline-none"><div class="flex items-center justify-between"><div class="flex items-center gap-4 bg-white px-4 py-2 rounded-2xl border"><button onclick="this.nextElementSibling.value = Math.max(1, parseInt(this.nextElementSibling.value)-1)" class="text-blue-600"><i class="fa-solid fa-minus"></i></button><input type="number" value="${time}" class="w-10 text-center font-mono font-bold bg-transparent outline-none"><button onclick="this.previousElementSibling.value = parseInt(this.previousElementSibling.value)+1" class="text-blue-600"><i class="fa-solid fa-plus"></i></button><span class="text-[10px] font-bold text-slate-300">min</span></div><button onclick="this.closest('.agenda-row').remove()" class="text-rose-400 text-sm"><i class="fa-solid fa-trash-can"></i> 削除</button></div>`;
        document.getElementById('agendaInputList').appendChild(div);
    }

    // (以下、既存UI連携用関数)
    function toggleMeeting() { 
        const btn = document.getElementById('mainBtn'); 
        if(!isRunning) { 
            isRunning = true; startVisualizer(); btn.innerHTML = '<i class="fa-solid fa-stop"></i> <span class="uppercase">Finish</span>'; 
            btn.classList.replace('bg-blue-600', 'bg-rose-600'); recognition.start(); timerInterval = setInterval(tick, 1000); 
        } else { 
            isRunning = false; btn.innerHTML = '<i class="fa-solid fa-play"></i> <span class="uppercase">Start</span>'; 
            btn.classList.replace('bg-rose-600', 'bg-blue-600'); recognition.stop(); clearInterval(timerInterval); 
        } 
    }
    function tick() { totalSeconds++; document.getElementById('totalCost').innerText = Math.floor((totalSeconds * 20000) / 3600).toLocaleString(); if(timeLeft > 0) timeLeft--; else deviationScore += 0.4; deviationScore = Math.min(100, deviationScore+0.05); updateUI(); }
    function updateUI() { const m = Math.floor(Math.abs(timeLeft)/60).toString().padStart(2,'0'), s = (Math.abs(timeLeft)%60).toString().padStart(2,'0'); document.getElementById('timerDisplay').innerText = `${m}:${s}`; const c = document.getElementById('devCircle'), circum = 628; c.style.strokeDashoffset = circum - (deviationScore/100) * circum; document.getElementById('devPercent').innerText = `Deviation ${Math.floor(deviationScore)}%`; c.style.color = deviationScore > 80 ? "#e11d48" : (deviationScore > 40 ? "#f59e0b" : "#2563eb"); }
    function updateAgendaUI() { if(agendas[currentIdx]) { document.getElementById('currentTitle').innerText = agendas[currentIdx].title; timeLeft = agendas[currentIdx].time * 60; updateUI(); } }
    function setSpeaker(n) { currentSpeaker = n; document.querySelectorAll('.speaker-chip').forEach(b => b.classList.toggle('active', b.innerText === n || (n === null && b.id === 'btn-default'))); }
    function openAgendaModal() { document.getElementById('agendaModal').classList.add('open'); }
    function closeAgendaModal() { document.getElementById('agendaModal').classList.remove('open'); }
    function openRegisterModal() { document.getElementById('registerModal').classList.remove('hidden'); }
    function closeRegisterModal() { isRegistering = false; document.getElementById('registerModal').classList.add('hidden'); }
    function toggleReport() { document.getElementById('reportDrawer').classList.toggle('open'); }
</script>
</body>
</html>
