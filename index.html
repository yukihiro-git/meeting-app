<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GIPS ULTIMATE PROFESSIONAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Noto+Sans+JP:wght@400;700;900&family=Orbitron:wght@700;900&display=swap');
        :root { --blue: #2563eb; --danger: #ef4444; --bg: #f8fafc; }
        body { background-color: var(--bg); color: #1e293b; font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; height: 100vh; overflow: hidden; }
        .font-mono-ai { font-family: 'Orbitron', sans-serif; }

        /* スピーカーチップ */
        .speaker-dock { display: flex; gap: 8px; overflow-x: auto; padding: 12px 20px; background: #fff; border-bottom: 1px solid #f1f5f9; }
        .speaker-chip { flex: 0 0 auto; padding: 10px 20px; border-radius: 14px; background: #f1f5f9; font-size: 12px; font-weight: 800; border: 2px solid transparent; color: #94a3b8; transition: 0.2s; cursor: pointer; }
        .speaker-chip.active { background: var(--blue); color: white; border-color: var(--blue); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }

        /* レイアウト構造 */
        .app-layout { display: flex; flex-direction: column; height: 100vh; }
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 20px; overflow-y: auto; padding-bottom: 180px; }
        
        /* 議題セクション */
        .agenda-section { background: white; border-radius: 28px; padding: 20px; border-left: 10px solid var(--blue); box-shadow: 0 4px 20px rgba(0,0,0,0.05); cursor: pointer; }
        
        /* 監視セクション */
        .monitor-card { background: white; border-radius: 32px; padding: 40px 20px; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .visualizer-container { display: flex; gap: 4px; height: 20px; align-items: center; margin-top: 20px; }
        .vis-bar { width: 4px; height: 4px; background: var(--blue); border-radius: 2px; transition: height 0.1s; }

        /* レポートエリア（常に見える） */
        .report-section { background: white; border-top: 1px solid #e2e8f0; height: 300px; overflow: hidden; display: flex; flex-direction: column; }
        .tab-btn { flex: 1; padding: 12px; font-weight: 800; font-size: 13px; text-align: center; border-bottom: 3px solid transparent; color: #cbd5e1; }
        .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

        /* 固定アクションボタン */
        .action-tray { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 20px; border-top: 1px solid #f1f5f9; display: flex; gap: 12px; z-index: 500; }

        #agendaModal, #registerModal { position: fixed; inset: 0; background: white; z-index: 1000; display: none; flex-direction: column; }
        .modal-open { display: flex !important; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col">

    <div class="app-layout">
        <div class="pt-10 bg-white">
            <div class="speaker-dock no-scrollbar" id="speakerDock">
                <button onclick="changeSpeaker(this)" id="btn-default" class="speaker-chip active">全員</button>
            </div>
        </div>

        <div class="main-content">
            <div class="agenda-section active:scale-95 transition-all" id="agendaTriggerBtn">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-1">Config & Settings</p>
                        <h2 id="currentTitle" class="text-xl font-black text-slate-800">議題を設定してください</h2>
                    </div>
                    <div class="text-right border-l pl-4 border-slate-100">
                        <p class="text-[9px] font-bold text-rose-400 uppercase">Cost</p>
                        <p class="text-xl font-mono-ai font-black">¥<span id="totalCost">0</span></p>
                    </div>
                </div>
            </div>

            <div class="monitor-card">
                <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.4em] mb-4">Stability Monitor</p>
                <div id="timerDisplay" class="text-7xl font-mono-ai font-black text-slate-900 tracking-tighter">00:00</div>
                <div class="visualizer-container" id="visualizer">
                    <div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div>
                </div>
            </div>

            <div class="bg-blue-50/20 border-dashed border-2 border-blue-100 p-6 rounded-[28px] text-center italic text-blue-800 font-bold min-h-[100px] flex items-center justify-center">
                <p id="liveTranscript">Ready to sync...</p>
            </div>
        </div>

        <div class="report-section">
            <div class="flex border-b">
                <button onclick="switchTab('summary')" id="tab-summary-btn" class="tab-btn active uppercase tracking-widest">AI要約</button>
                <button onclick="switchTab('logs')" id="tab-logs-btn" class="tab-btn uppercase tracking-widest">全ログ</button>
            </div>
            <div class="flex-1 overflow-y-auto p-5 no-scrollbar">
                <div id="tab-summary" class="space-y-4"></div>
                <div id="tab-logs" class="hidden font-mono text-[11px] text-slate-400 space-y-2"></div>
            </div>
        </div>
    </div>

    <div class="action-tray">
        <button id="mainBtn" class="flex-[3] h-16 bg-slate-900 text-white rounded-[24px] flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all">
            <i class="fa-solid fa-play"></i><span class="text-lg font-black uppercase tracking-widest">Start</span>
        </button>
        <button id="registerTriggerBtn" class="flex-1 h-16 bg-white text-blue-600 rounded-[24px] flex items-center justify-center border-2 border-blue-50 shadow-xl active:scale-95">
            <i class="fa-solid fa-user-plus text-xl"></i>
        </button>
    </div>

    <div id="agendaModal">
        <div class="p-8 pt-16 flex justify-between items-center border-b">
            <h3 class="text-2xl font-black italic uppercase tracking-tighter">Meeting Agenda</h3>
            <button id="closeAgendaBtn" class="text-slate-300 text-4xl p-2"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-6 space-y-6 bg-slate-50">
            <div class="flex justify-between items-center"><span class="font-black text-xs text-blue-600">LIST</span><button onclick="addAgendaRow()" class="px-4 py-2 bg-blue-600 text-white rounded-full text-[10px] font-bold">+ ADD</button></div>
            <div id="agendaInputList" class="space-y-4"></div>
            <div class="pt-10">
                <span class="text-xs font-black text-rose-500 uppercase mb-2 block">Intervention Keywords</span>
                <input type="text" id="ngWordsInput" value="検討します,難しい,できない,無理" class="w-full border-2 p-5 rounded-[20px] font-bold text-rose-500 outline-none shadow-sm">
            </div>
        </div>
        <div class="p-6 bg-white border-t pb-12"><button onclick="saveAgendas()" class="w-full py-5 bg-blue-600 text-white font-black rounded-[24px] text-lg active:scale-95 transition-all">適用して戻る</button></div>
    </div>

    <div id="registerModal">
        <div class="p-8 pt-16 flex justify-between items-center border-b bg-white">
            <h3 class="text-2xl font-black uppercase tracking-tighter">Speaker Registration</h3>
            <button id="closeRegBtn" class="text-slate-300 text-4xl p-2"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="flex-1 flex flex-col items-center justify-center p-8 bg-slate-50 text-center">
            <p class="text-sm text-slate-400 mb-6">「私は佐藤です」のように名乗ってください</p>
            <div class="bg-white w-full rounded-[40px] p-8 min-h-[200px] flex items-center justify-center shadow-sm border border-slate-100">
                <p id="regLiveText" class="text-2xl text-blue-600 font-black italic leading-tight">Waiting for voice...</p>
            </div>
            <button onclick="startAutoRegister()" class="w-full py-6 bg-blue-600 text-white font-black rounded-[24px] mt-10 shadow-xl text-lg uppercase tracking-widest">録音開始</button>
        </div>
    </div>

<script>
    let isRunning = false, isRegistering = false, currentIdx = 0, totalSeconds = 0, deviationScore = 0, recognition, timerInterval, timeLeft = 0, agendas = [];
    let speakers = []; 
    let audioContext, analyser, dataArray, source;
    let ngWords = ["検討します", "難しい", "できない", "無理"];

    window.onload = () => {
        addAgendaRow("進捗の確認", 10);
        // Event Listeners (絶対に反応するように紐付け)
        document.getElementById('agendaTriggerBtn').onclick = () => document.getElementById('agendaModal').classList.add('modal-open');
        document.getElementById('closeAgendaBtn').onclick = () => document.getElementById('agendaModal').classList.remove('modal-open');
        document.getElementById('registerTriggerBtn').onclick = () => document.getElementById('registerModal').classList.add('modal-open');
        document.getElementById('closeRegBtn').onclick = () => { isRegistering = false; document.getElementById('registerModal').classList.remove('modal-open'); };
        document.getElementById('mainBtn').onclick = toggleMeeting;

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'ja-JP';
            recognition.onresult = (e) => {
                let final = "", interim = "";
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) final += e.results[i][0].transcript;
                    else interim += e.results[i][0].transcript;
                }
                if (isRegistering) {
                    document.getElementById('regLiveText').innerText = interim || final;
                    if (final) processAutoRegister(final);
                }
                if (isRunning) {
                    if (interim) document.getElementById('liveTranscript').innerText = interim;
                    if (final) processMeetingSpeech(final);
                }
            };
            recognition.onend = () => { if(isRunning || isRegistering) recognition.start(); };
        }
    };

    // 話者名を確実に取得する
    function getSpeakerName() {
        const active = document.querySelector('.speaker-chip.active');
        return active ? active.innerText : "全員";
    }

    function changeSpeaker(btn) {
        document.querySelectorAll('.speaker-chip').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
    }

    function processMeetingSpeech(text) {
        const time = new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
        const name = getSpeakerName();
        const formatted = `[${name}] ${text}`;
        
        // Logs
        const logs = document.getElementById('tab-logs');
        const entry = document.createElement('div');
        const isNG = ngWords.some(w => text.includes(w));
        entry.className = isNG ? "text-rose-600 font-bold p-1 bg-rose-50 rounded" : "mb-1";
        entry.innerHTML = `<span class="opacity-30 mr-2">[${time}]</span>${formatted}`;
        logs.prepend(entry);

        // Summary
        if (text.includes("決定") || text.includes("タスク") || isNG) {
            const summary = document.getElementById('tab-summary');
            const card = document.createElement('div');
            card.className = `p-5 rounded-[24px] border-l-[10px] ${isNG ? 'border-rose-500 bg-rose-50' : 'border-blue-600 bg-blue-50'} shadow-sm`;
            card.innerHTML = `<p class="text-[9px] font-black uppercase ${isNG ? 'text-rose-600' : 'text-blue-600'}">${isNG ? 'NG Alert' : 'Key Decision'}</p><p class="text-sm font-black text-slate-800 leading-tight">${formatted}</p>`;
            summary.prepend(card);
        }
    }

    function toggleMeeting() {
        const btn = document.getElementById('mainBtn');
        if (!isRunning) {
            isRunning = true; btn.innerHTML = '<i class="fa-solid fa-stop"></i> <span class="uppercase">Finish Meeting</span>';
            btn.classList.replace('bg-slate-900', 'bg-rose-600');
            startVisualizer(); recognition.start(); timerInterval = setInterval(tick, 1000);
        } else {
            isRunning = false; btn.innerHTML = '<i class="fa-solid fa-play"></i> <span class="uppercase">Start</span>';
            btn.classList.replace('bg-rose-600', 'bg-slate-900');
            recognition.stop(); clearInterval(timerInterval);
        }
    }

    function tick() {
        totalSeconds++; document.getElementById('totalCost').innerText = Math.floor((totalSeconds * 20000) / 3600).toLocaleString();
        if(timeLeft > 0) timeLeft--; else deviationScore = Math.min(100, deviationScore + 0.5);
        updateUI();
    }

    function updateUI() {
        const m = Math.floor(timeLeft/60).toString().padStart(2,'0'), s = (timeLeft%60).toString().padStart(2,'0');
        document.getElementById('timerDisplay').innerText = `${m}:${s}`;
        if(timeLeft < 60) document.getElementById('timerDisplay').classList.add('text-rose-500');
    }

    function addAgendaRow(title="", time=10) {
        const div = document.createElement('div');
        div.className = "agenda-row p-5 bg-white rounded-[24px] border-2 flex flex-col gap-2";
        div.innerHTML = `<input type="text" placeholder="議題タイトル" value="${title}" class="w-full font-black text-lg outline-none text-slate-800"><div class="flex items-center justify-between"><div class="flex items-center gap-2 bg-slate-50 px-3 py-1 rounded-xl"><button onclick="this.nextElementSibling.value--">-</button><input type="number" value="${time}" class="w-10 text-center font-bold bg-transparent outline-none text-blue-600"><button onclick="this.previousElementSibling.value++">+</button><span class="text-[10px] text-slate-400">min</span></div><button onclick="this.closest('.agenda-row').remove()" class="text-rose-400"><i class="fa-solid fa-trash"></i></button></div>`;
        document.getElementById('agendaInputList').appendChild(div);
    }

    function saveAgendas() {
        const rows = document.querySelectorAll('.agenda-row');
        agendas = Array.from(rows).map(r => ({ title: r.querySelector('input[type="text"]').value || "未設定", time: parseInt(r.querySelector('input[type="number"]').value) || 1 }));
        if(agendas[0]) { document.getElementById('currentTitle').innerText = agendas[0].title; timeLeft = agendas[0].time * 60; }
        document.getElementById('agendaModal').classList.remove('modal-open');
        updateUI();
    }

    function switchTab(tab) {
        document.getElementById('tab-summary').classList.toggle('hidden', tab !== 'summary');
        document.getElementById('tab-logs').classList.toggle('hidden', tab !== 'logs');
        document.getElementById('tab-summary-btn').classList.toggle('active', tab === 'summary');
        document.getElementById('tab-logs-btn').classList.toggle('active', tab === 'logs');
    }

    async function startVisualizer() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser(); analyser.fftSize = 32;
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            source = audioContext.createMediaStreamSource(stream); source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount); drawVisualizer();
        }
    }
    function drawVisualizer() {
        requestAnimationFrame(drawVisualizer);
        const bars = document.querySelectorAll('.vis-bar');
        if (!isRunning && !isRegistering) { bars.forEach(b => b.style.height = '4px'); return; }
        analyser.getByteFrequencyData(dataArray);
        bars.forEach((b, i) => { b.style.height = Math.max(4, dataArray[i]/4) + 'px'; });
    }

    function startAutoRegister() { isRegistering = true; recognition.start(); }
    function processAutoRegister(text) {
        let name = text.replace(/私は|です|と申します|と言います/g, "").trim();
        if (name.length > 1 && name.length < 8) {
            if(!speakers.includes(name)) {
                speakers.push(name);
                const chip = document.createElement('button'); chip.className = "speaker-chip"; chip.innerText = name;
                chip.onclick = () => changeSpeaker(chip); document.getElementById('speakerDock').appendChild(chip);
                setTimeout(() => document.getElementById('registerModal').classList.remove('modal-open'), 1000);
            }
        }
    }
</script>
</body>
</html>
